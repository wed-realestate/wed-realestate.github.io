<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">شركة ود العقارية - الرئيسية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. متغيرات الألوان وأنظمة العرض (CSS Variables & Themes)
           ========================================================================== */
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-nav: #1a252f;
            --bg-section: #ffffff;
            --border-card: #e2f0ea;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-nav: #0a0f14;
            --bg-section: #1e1e1e;
            --border-card: #2c3e50;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        /* ==========================================================================
           2. التنسيقات العامة وعناصر الهيكل الأساسية (Global Styles)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 40px;
        }

        /* ==========================================================================
           3. شريط التنقل العلوي (Navigation Bar)
           ========================================================================== */
        .nav-bar {
            background-color: var(--bg-nav);
            padding: 15px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo i {
            color: #1abc9c;
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .lang-btn, .theme-btn {
            background: #1abc9c;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 35px;
        }

        .lang-btn:hover, .theme-btn:hover {
            background: #16a085;
        }

        /* ==========================================================================
           4. محتوى الصفحة وشبكة العقارات (Grid Layout)
           ========================================================================== */
        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header-box h2 {
            font-size: 2rem;
            color: var(--text-title);
            margin-bottom: 10px;
        }

        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* ==========================================================================
           5. بطاقات العقارات (Property Cards)
           ========================================================================== */
        .property-card {
            background: var(--bg-section);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px var(--shadow);
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease, box-shadow 0.3s ease;
        }

        .property-card.show {
            transform: translateY(0);
            opacity: 1;
        }

        .property-card:hover {
            box-shadow: 0 15px 30px var(--shadow);
            transform: translateY(-5px);
        }

        .card-img-wrapper {
            width: 100%;
            height: 200px;
            background: #eeeeee;
            overflow: hidden;
            position: relative;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.2rem;
            color: var(--text-title);
            margin-bottom: 15px;
            font-weight: 700;
            line-height: 1.4;
        }

        .view-details-btn {
            margin-top: auto;
            background: #1abc9c;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            display: block;
            transition: background 0.2s;
        }

        .view-details-btn:hover {
            background: #16a085;
        }

        .status-msg {
            text-align: center;
            grid-column: 1 / -1;
            padding: 50px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-title);
        }

        footer {
            background-color: var(--bg-nav);
            color: white;
            text-align: center;
            padding: 25px 10px;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .page-header-box h2 { font-size: 1.6rem; }
        }
    </style>
</head>

<body>

    <div class="nav-bar">
        <div class="nav-container">
            <a href="index.html" class="brand-logo">
                <i class="fa-solid fa-building-shield"></i>
                <span id="logoText">شركة ود العقارية</span>
            </a>
