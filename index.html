<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">شركة ود العقارية - Wed Real Estate</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. نظام الألوان والمتغيرات (Themes)
           ========================================================================== */
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-card: #fff;
            --border-card: #e2f0ea;
            --bg-features: #f8f9fa;
            --text-features: #555;
            --bg-header: #1a252f;
            --bg-footer: #1a252f;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-card: #1e1e1e;
            --border-card: #2c3e50;
            --bg-features: #2a2a2a;
            --text-features: #ccc;
            --bg-header: #0a0f14;
            --bg-footer: #0a0f14;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        /* ==========================================================================
           2. الهيدر والشعار (اللوجو بإطار أبيض في المنتصف)
           ========================================================================== */
        header { 
            background-color: var(--bg-header);
            color: #fff; 
            text-align: center; 
            padding: 40px 20px; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header-content { text-align: center; }
        header h1 { font-size: 2rem; line-height: 1.4; }
        header p { color: #1abc9c; margin-top: 5px; font-size: 1rem; }

        /* تعديل الشعار حسب المطلوب: في المنتصف مع إطار أبيض فاتح */
        .logo-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.9); /* إطار أبيض فاتح */
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls-wrapper { 
            position: absolute;
            top: 15px; 
            left: 20px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        html[dir="ltr"] .controls-wrapper { left: auto; right: 20px; }

        .lang-btn, .theme-btn { 
            background: #1abc9c;
            color: #fff; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center;
            gap: 5px; 
            height: 32px;
        }
        .lang-btn:hover, .theme-btn:hover { background: #16a085; }

        /* ==========================================================================
           3. شبكة العرض (كروت العقارات)
           ========================================================================== */
        .container { 
            max-width: 1200px;
            margin: 0 auto; 
            padding: 30px 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px;
        }

        .property-card { 
            background: var(--bg-card);
            border-radius: 8px; 
            border: 2px solid var(--border-card); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        .property-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15); 
            border-color: #1abc9c; 
        }

        .property-image { 
            position: relative;
            width: 100%; 
            height: 200px; 
            overflow: hidden; 
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        .property-image img { width: 100%; height: 100%; object-fit: cover; }
        .property-card:hover .property-image img { transform: scale(1.05); }

        .badge { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            color: white; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            z-index: 2; 
        }
        html[dir="ltr"] .badge { right: auto; left: 15px; }
        
        .badge-sale { background: #e74c3c; }    
        .badge-rent { background: #2ecc71; }    
        .badge-buy { background: #3498db; }     
        .badge-sold { background: #95a5a6; }    
        .badge-default { background: #1abc9c; } 

        .live-counter-eye {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 2;
            opacity: 0;
            transform: scale(0.8);
        }
        html[dir="ltr"] .live-counter-eye { left: auto; right: 15px; }
        .live-counter-eye.active { opacity: 1; transform: scale(1); }
        .live-counter-eye i { color: #e74c3c; animation: pulseEye 1.2s infinite ease-in-out; }
        @keyframes pulseEye { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .property-details { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .price { color: #e74c3c; font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
        .title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: var(--text-title); }
        .description { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .features-icons { display: flex; justify-content: space-between; background: var(--bg-features); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8rem; color: var(--text-features); }
        .icon-item i { color: #1abc9c; margin: 0 5px; }

        .view-details-btn { display: block; text-align: center; background: #2c3e50; color: white; text-decoration: none; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-weight: 600; font-size: 0.9rem; }
        .view-details-btn:hover { background: #1abc9c; }

        .contact-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-contact { display: flex; justify-content: center; align-items: center; padding: 10px; border-radius: 8px; color: white; font-size: 1.2rem; text-decoration: none; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-phone { background-color: #3498db; }
        .btn-facebook { background-color: #1877F2; }

        /* ==========================================================================
           4. قسم الخريطة المرئية (Map Section)
           ========================================================================== */
        .map-section {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            padding: 0 15px;
        }
        .map-section h2 {
            text-align: center;
            color: var(--text-title);
            margin-bottom: 20px;
        }
        .map-wrapper-iframe {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid var(--border-card);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .map-wrapper-iframe iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-indicator { grid-column: 1 / -1; text-align: center; padding: 40px; font-weight: bold; }
        
        footer { background-color: var(--bg-footer); color: white; text-align: center; padding: 30px 15px; }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .footer-btn { background: rgba(255, 255, 255, 0.1); color: #fff; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="controls-wrapper">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="lang-btn" onclick="toggleLanguage()">
                <i class="fa-solid fa-globe"></i> <span id="langText">EN</span>
            </button>
        </div>
        
        <div class="logo-wrapper">
            <img id="mainLogo" src="" alt="Wed Logo" class="brand-logo">
        </div>
        
        <div class="header-content">
            <h1 id="headerTitle">شركة ود العقارية</h1>
            <p id="headerSub">ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة</p>
        </div>
    </header>

    <main class="container" id="propertiesContainer">
        <div class="loading-indicator" id="loadingIndicator">
            <i class="fa-solid fa-circle-notch fa-spin"></i> جاري جلب العقارات الحديثة...
        </div>
    </main>

    <section class="map-section">
        <h2 id="mapTitle">موقعنا على الخريطة</h2>
        <div class="map-wrapper-iframe">
            <iframe id="googleMapIframe" src="" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="terms.html" class="footer-btn" id="footerLink1"><span>الشروط والأحكام</span></a>
        </div>
        <p id="footerCopy">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
    </footer>

    <script>
    /* ==========================================================================
       مركز التحكم والاختصارات الشامل (عدل من هنا فقط!)
       ========================================================================== */
    const CONFIG = {
        // روابط الصور والشعار
        LOGO_URL: "jpg.jpeg", 
        
        // رابط الخريطة المضمنة (Google Maps Embed URL)
        MAP_EMBED_URL: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3456.789!2d31.235!3d30.044!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzM4LjQiTiAzMcKwMTQnMDYuMCJF!5e0!3m2!1sen!2seg!4v1620000000000!5m2!1sen!2seg",
        
        // رابط API جوجل شيت
        API_URL: "https://script.google.com/macros/s/AKfycbwF__Bgk6KSUPH-39bDG3MdvVRigqmRZ_uqLO6Rokmb0xqCvbhC_5j0vACJXSHAdVmS/exec",
        
        // معدل التحديث التلقائي (بالملي ثانية)
        AUTO_REFRESH_INTERVAL: 15000, 
        
        // أرقام وروابط التواصل المباشر
        CONTACTS: {
            whatsapp: "201234567890",       
            phone: "+201234567890",          
            facebook: "https://facebook.com/yourpage" 
        }
    };

    // تطبيق إعدادات مركز التحكم فوراً
    document.getElementById('mainLogo').src = CONFIG.LOGO_URL;
    document.getElementById('googleMapIframe').src = CONFIG.MAP_EMBED_URL;

    /* ==========================================================================
       نظام الترجمة الفورية (بدون إعادة تحميل)
       ========================================================================== */
    const translations = {
        ar: {
            pageTitle: "شركة ود العقارية", headerTitle: "شركة ود العقارية", headerSub: "ابحث عن شقة أحلامك بسهولة",
            langBtn: "EN", viewBtn: "التفاصيل والصور", mapTitle: "موقعنا على الخريطة",
            loading: "جاري جلب العقارات...", rooms: "غرف", bathrooms: "حمامات", area: "م²", liveView: "يشاهدونه الآن",
            sale: "للبيع", rent: "للايجار", buy: "شراء", sold: "مباع"
        },
        en: {
            pageTitle: "Wed Real Estate", headerTitle: "Wed Real Estate", headerSub: "Find your dream apartment easily",
            langBtn: "AR", viewBtn: "View Details", mapTitle: "Our Location on Map",
            loading: "Loading properties...", rooms: "Beds", bathrooms: "Baths", area: "m²", liveView: "viewing now",
            sale: "For Sale", rent: "For Rent", buy: "For Buy", sold: "Sold"
        }
    };

    let currentLang = localStorage.getItem('selectedLang') || 'ar';
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('selectedLang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        document.documentElement.setAttribute('lang', lang);

        document.getElementById('headerTitle').textContent = translations[lang].headerTitle;
        document.getElementById('headerSub').textContent = translations[lang].headerSub;
        document.getElementById('langText').textContent = translations[lang].langBtn;
        document.getElementById('mapTitle').textContent = translations[lang].mapTitle;
        
        if (cachedProperties.length > 0) renderProperties(cachedProperties);
    }
    function toggleLanguage() { setLanguage(currentLang === 'ar' ? 'en' : 'ar'); }

    /* ==========================================================================
       الوضع الليلي والفاتح (Dark/Light Mode)
       ========================================================================== */
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('themeBtn').innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    }
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }
    setTheme(localStorage.getItem('theme') || 'light');

    /* ==========================================================================
       محرك جلب البيانات الذكي (يتخطى الخانات الفارغة)
       ========================================================================== */
    let cachedProperties = [];

    async function loadProperties(isBackground = false) {
        const localData = localStorage.getItem('properties_cache');
        if (localData && !isBackground) {
            cachedProperties = JSON.parse(localData);
            renderProperties(cachedProperties);
        }

        try {
            const response = await fetch(CONFIG.API_URL);
            const data = await response.json();
            
            if (JSON.stringify(data) !== JSON.stringify(cachedProperties)) {
                cachedProperties = data;
                localStorage.setItem('properties_cache', JSON.stringify(data));
                renderProperties(cachedProperties);
            }
        } catch (error) {
            console.error("API Fetch Error");
        }
    }
    setInterval(() => loadProperties(true), CONFIG.AUTO_REFRESH_INTERVAL);

    function renderProperties(properties) {
        const container = document.getElementById('propertiesContainer');
        container.innerHTML = '';

        properties.forEach(item => {
            // حماية برمجية: تخطي العنصر إذا كانت الخانات الأساسية فارغة
            if (!item.العقار && !item.السعر) return;

            const badgeStatus = item.الحالة || "عقار";
            const initialViews = Math.floor(Math.random() * 8) + 3;

            const card = document.createElement('div');
            card.className = 'property-card';
            card.innerHTML = `
                <div class="property-image">
                    <span class="badge badge-default">${badgeStatus}</span>
                    <div class="live-counter-eye active">
                        <i class="fa-solid fa-eye"></i> <span>${initialViews} ${translations[currentLang].liveView}</span>
                    </div>
                    <img src="${item.الصورة || 'https://via.placeholder.com/400'}" alt="${item.العقار}">
                </div>
                <div class="property-details">
                    <div class="price">${item.السعر || '-'}</div>
                    <h2 class="title">${item.العقار || 'غير محدد'}</h2>
                    <p class="description">${item.الوصف || ''}</p>
                    <div class="features-icons">
                        <div><i class="fa-solid fa-bed"></i> ${item.عدد_الغرف || 0} ${translations[currentLang].rooms}</div>
                        <div><i class="fa-solid fa-bath"></i> ${item.عدد_الحمامات || 0} ${translations[currentLang].bathrooms}</div>
                        <div><i class="fa-solid fa-ruler"></i> ${item.المساحة || 0} ${translations[currentLang].area}</div>
                    </div>
                    <a href="#" class="view-details-btn">${translations[currentLang].viewBtn}</a>
                    <div class="contact-buttons">
                        <a href="https://wa.me/${CONFIG.CONTACTS.whatsapp}" class="btn-contact btn-whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
                        <a href="tel:${CONFIG.CONTACTS.phone}" class="btn-contact btn-phone"><i class="fa-solid fa-phone"></i></a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        setLanguage(currentLang);
        loadProperties();
    });
    </script>
</body>
</html>
