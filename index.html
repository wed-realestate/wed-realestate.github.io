<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عقارات سوريا - دليل العقارات الأول</title>
    <style>
        /* إعدادات الخطوط والألوان العامة */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --background-light: #f8f9fa;
            --text-dark: #333;
            --border-color: #ddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        /* الهيدر (شريط التنقّل) */
        header {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .btn-add-property {
            background-color: var(--accent-color);
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-add-property:hover {
            background-color: #c0392b;
        }

        /* قسم البحث والفلاتر المتقدمة للسوق السوري */
        .search-section {
            background: linear-gradient(rgba(44, 62, 80, 0.85), rgba(44, 62, 80, 0.85)), url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            padding: 60px 10%;
            text-align: center;
            color: #fff;
        }

        .search-section h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .filter-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: right;
            color: var(--text-dark);
        }

        .filter-group label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .filter-group select, .filter-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }

        .btn-search {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-search:hover {
            background-color: #1a252f;
        }

        /* قسم عرض العقارات */
        .listings-section {
            padding: 40px 5%;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 10px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 3px;
            background-color: var(--accent-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .property-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .property-card:hover {
            transform: translateY(-5px);
        }

        .property-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .property-content {
            padding: 20px;
        }

        .property-price {
            color: var(--accent-color);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .property-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .property-location {
            color: #777;
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .property-details {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            font-size: 13px;
            color: #555;
        }

        /* التجاوب مع الشاشات الصغيرة */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            .nav-links {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- الهيدر الخاص بالمنصة -->
    <header>
        <div class="logo">عقارات<span>سوريا</span></div>
        <ul class="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">للبيع</a></li>
            <li><a href="#">للإيجار</a></li>
            <li><a href="#">المكاتب العقارية</a></li>
        </ul>
        <a href="#" class="btn-add-property">+ أضف عقارك مجاناً</a>
    </header>

    <!-- محرك البحث والفلاتر الخاصة بالريجن السوري -->
    <section class="search-section">
        <h1>ابحث عن بيتك المستقبلي في سوريا</h1>
        <div class="filter-container">
            <div class="filter-group">
                <label>المحافظة</label>
                <select id="city-filter">
                    <option value="all">كل المحافظات</option>
                    <option value="دمشق">دمشق</option>
                    <option value="ريف دمشق">ريف دمشق</option>
                    <option value="حلب">حلب</option>
                    <option value="لاذقية">اللاذقية</option>
                    <option value="طرطوس">طرطوس</option>
                    <option value="حمص">حمص</option>
                </select>
            </div>
            <div class="filter-group">
                <label>نوع العقار</label>
                <select id="type-filter">
                    <option value="all">الكل</option>
                    <option value="شقة">شقة سكنية</option>
                    <option value="منزل عربي">منزل عربي قديم</option>
                    <option value="فيلا">فيلا / مزرعة</option>
                    <option value="مكتب">مكتب تجاري</option>
                </select>
            </div>
            <div class="filter-group">
                <label>نوع العملية</label>
                <select id="status-filter">
                    <option value="all">الكل</option>
                    <option value="للبيع">للبيع</option>
                    <option value="للإيجار">للإيجار</option>
                </select>
            </div>
            <div class="filter-group">
                <label>السعر الأقصى (ل.س)</label>
                <input type="number" id="price-filter" placeholder="مثال: 500,000,000">
            </div>
            <button class="btn-search" onclick="filterProperties()">تصفية النتائج</button>
        </div>
    </section>

    <!-- قسم العقارات المدرجة -->
    <section class="listings-section">
        <h2 class="section-title">أحدث العقارات المضافة</h2>
        <div class="grid-container" id="properties-grid">
            <!-- سيتم توليد البطاقات العقارية هنا بواسطة الـ JavaScript -->
        </div>
    </section>

    <script>
        // بيانات تجريبية لعقارات من السوق السوري للـ Marketplace
        const propertiesData = [
            {
                id: 1,
                title: "شقة مميزة في تنظيم كفرسوسة",
                city: "دمشق",
                type: "شقة",
                status: "للبيع",
                price: 950000000,
                beds: 3,
                baths: 2,
                area: 160,
                image: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 2,
                title: "شقة للإيجار السنوي في مشروع دمر",
                city: "دمشق",
                type: "شقة",
                status: "للإيجار",
                price: 45000000, 
                beds: 2,
                baths: 1,
                area: 110,
                image: "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 3,
                title: "منزل عربي قديم في أحياء حلب القديمة",
                city: "حلب",
                type: "منزل عربي",
                status: "للبيع",
                price: 600000000,
                beds: 5,
                baths: 2,
                area: 300,
                image: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 4,
                title: "شقة إطلالة بحرية كاملة - كورنيش طرطوس",
                city: "طرطوس",
                type: "شقة",
                status: "للبيع",
                price: 1200000000,
                beds: 3,
                baths: 2,
                area: 180,
                image: "https://images.unsplash.com/photo-1513584684374-8bab748fbf90?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 5,
                title: "شقة ديلوكس قريبة من ساحة الحطب",
                city: "حلب",
                type: "شقة",
                status: "للإيجار",
                price: 20000000,
                beds: 2,
                baths: 1,
                area: 95,
                image: "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=600&q=80"
            },
            {
                id: 6,
                title: "مزرعة مجهزة مع مسبح في جرمانا",
                city: "ريف دمشق",
                type: "فيلا",
                status: "للبيع",
                price: 2500000000,
                beds: 4,
                baths: 3,
                area: 1200,
                image: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600&q=80"
            }
        ];

        // دالة لعرض العقارات في الصفحة
        function displayProperties(properties) {
            const grid = document.getElementById('properties-grid');
            grid.innerHTML = '';

            if(properties.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding: 20px; font-size:18px;">عذراً، لا توجد عقارات تطابق خيارات البحث الحالية.</p>';
                return;
            }

            properties.forEach(prop => {
                const card = document.createElement('div');
                card.className = 'property-card';
                card.innerHTML = `
                    <img src="${prop.image}" alt="${prop.title}" class="property-img">
                    <div class="property-content">
                        <div class="property-price">${prop.price.toLocaleString()} ل.س</div>
                        <div class="property-title">${prop.title}</div>
                        <div class="property-location">📍 ${prop.city} | ${prop.status}</div>
                        <div class="property-details">
                            <span>🛏️ ${prop.beds} غرف</span>
                            <span>🛁 ${prop.baths} حمام</span>
                            <span>📐 ${prop.area} م²</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // دالة الفلترة التفاعلية
        function filterProperties() {
            const cityValue = document.getElementById('city-filter').value;
            const typeValue = document.getElementById('type-filter').value;
            const statusValue = document.getElementById('status-filter').value;
            const maxPrice = document.getElementById('price-filter').value;

            const filtered = propertiesData.filter(prop => {
                return (cityValue === 'all' || prop.city === cityValue) &&
                       (typeValue === 'all' || prop.type === typeValue) &&
                       (statusValue === 'all' || prop.status === statusValue) &&
                       (!maxPrice || prop.price <= parseFloat(maxPrice));
            });

            displayProperties(filtered);
        }

        // عرض كافة العقارات عند تحميل الصفحة لأول مرة
        window.onload = () => displayProperties(propertiesData);
    </script>
</body>
</html>
