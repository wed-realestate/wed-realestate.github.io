<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">شركة ود العقارية - WD Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #f4f7f6; --text-main: #333; --text-title: #2c3e50; --text-muted: #7f8c8d;
            --bg-card: #fff; --border-card: #e2f0ea; --bg-features: #f8f9fa; --text-features: #555;
            --bg-header: #1a252f; --bg-footer: #1a252f;
        }
        [data-theme="dark"] {
            --bg-body: #121212; --text-main: #e0e0e0; --text-title: #ffffff; --text-muted: #b0bec5;
            --bg-card: #1e1e1e; --border-card: #2c3e50; --bg-features: #2a2a2a; --text-features: #ccc;
            --bg-header: #0a0f14; --bg-footer: #0a0f14;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }
        header { background-color: var(--bg-header); color: #fff; text-align: center; padding: 70px 20px 40px 20px; margin-bottom: 30px; position: relative; display: flex; flex-direction: column; align-items: center; }
        header h1 { font-size: 2.2rem; margin-top: 15px; }
        header p { color: #1abc9c; margin-top: 10px; font-size: 1.1rem; }
        .logo-wrapper { position: absolute; top: 20px; right: 20px; z-index: 10; }
        html[dir="ltr"] .logo-wrapper { right: auto; left: 20px; }
        .brand-logo { width: 75px; height: 75px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.4); background: #000; }
        .controls-wrapper { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; align-items: center; z-index: 10; }
        html[dir="ltr"] .controls-wrapper { left: auto; right: 20px; }
        .lang-btn, .theme-btn { background: #1abc9c; color: #fff; border: none; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; height: 35px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .property-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 2px solid var(--border-card); box-shadow: 0 4px 15px rgba(0,0,0,0.04); display: flex; flex-direction: column; }
        .property-image { position: relative; width: 100%; padding-top: 65%; overflow: hidden; background: #eef2f5; }
        .property-image img, .property-image video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 15px; right: 15px; color: white; padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; z-index: 2; }
        html[dir="ltr"] .badge { right: auto; left: 15px; }
        .property-details { padding: 22px; display: flex; flex-direction: column; flex-grow: 1; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; min-height: 32px; }
        .price { color: #e74c3c; font-size: 1.4rem; font-weight: 700; }
        
        .live-counter-eye { color: #e74c3c; font-size: 1.1rem; background: rgba(231, 76, 60, 0.08); padding: 6px 10px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.7); transition: all 0.4s ease; }
        .live-counter-eye.is-visible { opacity: 1; transform: scale(1); animation: pulseEyeItem 2.5s infinite ease-in-out; }
        @keyframes pulseEyeItem { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

        .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; color: var(--text-title); }
        .description { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 18px; line-height: 1.6; height: 72px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .features-icons { display: flex; justify-content: space-between; background: var(--bg-features); padding: 12px; border-radius: 8px; margin-bottom: 18px; font-size: 0.85rem; color: var(--text-features); gap: 5px; }
        .icon-item { display: flex; align-items: center; }
        .icon-item i { color: #1abc9c; }
        html[dir="rtl"] .icon-item i { margin-left: 6px; }
        html[dir="ltr"] .icon-item i { margin-right: 6px; }
        .view-details-btn { display: block; text-align: center; background: #2c3e50; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; }
        .view-details-btn:hover { background: #1abc9c; }
        .contact-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-contact { display: flex; justify-content: center; align-items: center; padding: 12px; border-radius: 8px; color: white; text-decoration: none; font-size: 1.3rem; }
        .btn-whatsapp { background-color: #25D366; } .btn-phone { background-color: #3498db; } .btn-facebook { background-color: #1877F2; }
        footer { background-color: var(--bg-footer); color: white; text-align: center; padding: 35px 15px; margin-top: 50px; }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .footer-btn { background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; }
        @media (max-width: 580px) { header { padding: 110px 20px 35px 20px; } .logo-wrapper { top: 15px; right: 50%; transform: translateX(50%); } .controls-wrapper { top: 15px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); justify-content: space-between; } .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper"><img src="png.jpg" alt="Logo" class="brand-logo"></div>
    <div class="controls-wrapper">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
        <button class="lang-btn" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span id="langText">EN</span></button>
    </div>
    <h1 id="headerTitle">شركة ود العقارية</h1>
    <p id="headerSub">ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة</p>
</header>
<section class="properties">
    <div id="propertiesContainer" class="container"></div>
</section>

<footer>
    <div class="footer-links">
        <a href="terms.html" class="footer-btn" id="footerLink1"><i class="fa-solid fa-gavel"></i> <span>الشروط والأحكام</span></a>
        <a href="https://maps.google.com" target="_blank" class="footer-btn" id="footerLink2"><i class="fa-solid fa-map-location-dot"></i> <span>مواقعنا على خرائط جوجل</span></a>
    </div>
    <p id="footerCopy">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwWyAhLic8IbD9FQDDltNfLjh0fn-Q39UaRNGm1Um0R7SZn08WggmC2wvmpBaBdsVVN/exec";

const translations = {
    ar: { title: "شركة ود العقارية", headerTitle: "شركة ود العقارية", headerSub: "ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة", terms: "الشروط والأحكام", maps: "مواقعنا على خرائط جوجل", copy: "جميع الحقوق محفوظة © شركة ود العقارية 2026", viewDetails: "عرض التفاصيل", rooms: "غرف", baths: "حمام" },
    en: { title: "WD Real Estate", headerTitle: "WD Real Estate", headerSub: "Find your dream apartment.. buy, sell, and rent with ease", terms: "Terms & Conditions", maps: "Our Locations on Google Maps", copy: "All Rights Reserved © WD Real Estate 2026", viewDetails: "View Details", rooms: "Rooms", baths: "Baths" }
};

let currentLang = "ar";
let cachedProperties = [];
const fallbackImages = ["https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=600","https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600"];

function initializeEyeAutomation() {
    document.querySelectorAll('.live-counter-eye').forEach(eye => {
        function schedule() {
            setTimeout(() => {
                eye.classList.toggle('is-visible');
                schedule();
            }, Math.floor(Math.random() * 120000) + 60000);
        }
        schedule();
        if(Math.random() > 0.5) eye.classList.add('is-visible');
    });
}

function renderProperties(properties) {
    const container = document.getElementById("propertiesContainer");
    container.innerHTML = "";

    properties.forEach((property, index) => {
        const pName = currentLang === "ar" ? (property["الاسم"] || property["Name"]) : (property["Name"] || property["الاسم"]);
        const pDesc = currentLang === "ar" ? (property["الوصف"] || property["Description"] || "") : (property["Description"] || property["الوصف"] || "");
        const pId = property["id"] || property["ID"] || property["Id"] || property["المعرف"] || property["تسل"] || "";
        
        // عزل كلي للميديا: نأخذ أول رابط فقط من حقل "الصورة الرئيسية" أو "صورة العرض"
        const mainMediaStr = property["الصورة الرئيسية"] || property["صورة العرض"] || property["Image"] || "";
        const mainMediaUrl = mainMediaStr.split(',')[0].trim(); 

        let mediaHtml = "";
        if (mainMediaUrl.endsWith(".mp4") || mainMediaUrl.includes("video")) {
            mediaHtml = `<video src="${mainMediaUrl}" autoplay loop muted playsinline></video>`;
        } else if (mainMediaUrl !== "") {
            mediaHtml = `<img src="${mainMediaUrl}" alt="${pName}">`;
        } else {
            mediaHtml = `<img src="${fallbackImages[index % fallbackImages.length]}" alt="${pName}">`;
        }

        const pType = property["النوع"] || property["Type"] || property["العلامة"] || "";
        let badgeColor = property["لون العلامة"] || property["Badge Color"] || "";
        if (!badgeColor) {
            badgeColor = pType.includes("إيجار") ? "#e67e22" : "#e74c3c";
        }
        const badgeHtml = pType ? `<span class="badge" style="background-color: ${badgeColor};">${pType}</span>` : '';

        container.innerHTML += `
        <div class="property-card">
            <div class="property-image">${badgeHtml}${mediaHtml}</div>
            <div class="property-details">
                <div class="price-row">
                    <span class="price">${property["السعر"] || property["Price"] || ""}</span>
                    <span class="live-counter-eye"><i class="fa-solid fa-eye"></i></span>
                </div>
                <h3 class="title">${pName}</h3>
                <p class="description">${pDesc}</p>
                <div class="features-icons">
                    <span class="icon-item"><i class="fa-solid fa-bed"></i> ${property["الغرف"] || 0} ${translations[currentLang].rooms}</span>
                    <span class="icon-item"><i class="fa-solid fa-bath"></i> ${property["الحمامات"] || 0} ${translations[currentLang].baths}</span>
                    <span class="icon-item"><i class="fa-solid fa-ruler-combined"></i> ${property["المساحة"] || ""}</span>
                </div>
                <a href="apartment-details.html?id=${pId}&lang=${currentLang}" class="view-details-btn">${translations[currentLang].viewDetails}</a>
                <div class="contact-buttons">
                    <a href="https://wa.me/${property["واتساب"] || ""}" target="_blank" class="btn-contact btn-whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
                    <a href="tel:${property["الهاتف"] || ""}" class="btn-contact btn-phone"><i class="fa-solid fa-phone"></i></a>
                    <a href="${property["فيسبوك"] || "#"}" target="_blank" class="btn-contact btn-facebook"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
            </div>
        </div>`;
    });
    initializeEyeAutomation();
}

async function loadProperties() {
    try {
        const response = await fetch(API_URL);
        cachedProperties = await response.json();
        renderProperties(cachedProperties);
    } catch (error) { console.error(error); }
}

function toggleLanguage() {
    currentLang = currentLang === "ar" ? "en" : "ar";
    const html = document.getElementById("htmlPage");
    html.setAttribute("dir", currentLang === "en" ? "ltr" : "rtl");
    html.setAttribute("lang", currentLang);
    document.getElementById("langText").innerText = currentLang === "en" ? "AR" : "EN";
    renderProperties(cachedProperties);
}

function toggleTheme() {
    const html = document.getElementById("htmlPage");
    if (html.getAttribute("data-theme") === "dark") { html.removeAttribute("data-theme"); }
    else { html.setAttribute("data-theme", "dark"); }
}

document.addEventListener("DOMContentLoaded", loadProperties);
</script>
</body>
</html>
