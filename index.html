<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">شركة ود العقارية - WD Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-card: #fff;
            --border-card: #e2f0ea;
            --bg-features: #f8f9fa;
            --text-features: #555;
            --bg-header: #1a252f;
            --bg-footer: #1a252f;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-card: #1e1e1e;
            --border-card: #2c3e50;
            --bg-features: #2a2a2a;
            --text-features: #ccc;
            --bg-header: #0a0f14;
            --bg-footer: #0a0f14;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
            transition: background-color 0.3s, color 0.3s, border-color 0.3s; 
        }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }

        header { 
            background-color: var(--bg-header); 
            color: #fff; 
            text-align: center; 
            padding: 70px 20px 40px 20px; 
            margin-bottom: 30px; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        header h1 { font-size: 2.2rem; line-height: 1.4; margin-top: 15px; }
        header p { color: #1abc9c; margin-top: 10px; font-size: 1.1rem; }

        .logo-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }
        html[dir="ltr"] .logo-wrapper { right: auto; left: 20px; }

        .brand-logo {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
            background: #000;
        }

        .controls-wrapper { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
            z-index: 10;
        }
        html[dir="ltr"] .controls-wrapper { left: auto; right: 20px; }

        .lang-btn, .theme-btn { 
            background: #1abc9c; 
            color: #fff; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            height: 35px;
        }
        .lang-btn:hover, .theme-btn:hover { background: #16a085; }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px 40px 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
        }

        .property-card { 
            background: var(--bg-card);
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid var(--border-card); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.3s, border-color 0.3s; 
            display: flex; 
            flex-direction: column; 
        }
        .property-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.12); 
            border-color: #1abc9c; 
        }

        .property-image { 
            position: relative; 
            width: 100%; 
            padding-top: 65%; 
            overflow: hidden; 
            background: #eef2f5; 
        }
        .property-image img, .property-image video { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease; 
        }
        .property-card:hover .property-image img { transform: scale(1.04); }

        .badge { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            color: white; 
            padding: 5px 14px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            z-index: 2; 
        }
        html[dir="ltr"] .badge { right: auto; left: 15px; }

        .property-details { padding: 22px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            min-height: 32px;
        }
        .price { color: #e74c3c; font-size: 1.4rem; font-weight: 700; }
        
        .live-counter-eye {
            color: #e74c3c;
            font-size: 1.1rem;
            background: rgba(231, 76, 60, 0.08);
            padding: 6px 10px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.7);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .live-counter-eye.is-visible {
            opacity: 1;
            transform: scale(1);
            animation: pulseEyeItem 2.5s infinite ease-in-out;
        }
        @keyframes pulseEyeItem {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; color: var(--text-title); line-height: 1.4; }
        
        .description { 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            margin-bottom: 18px; 
            line-height: 1.6; 
            height: 72px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
        }

        .features-icons { 
            display: flex; 
            justify-content: space-between; 
            background: var(--bg-features); 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 18px; 
            font-size: 0.85rem; 
            color: var(--text-features); 
            gap: 5px;
        }
        .icon-item { display: flex; align-items: center; white-space: nowrap; }
        .icon-item i { color: #1abc9c; }
        html[dir="rtl"] .icon-item i { margin-left: 6px; }
        html[dir="ltr"] .icon-item i { margin-right: 6px; }

        .view-details-btn { display: block; text-align: center; background: #2c3e50; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; font-size: 0.95rem; transition: background 0.3s; }
        .view-details-btn:hover { background: #1abc9c; }

        .contact-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-contact { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px; 
            border-radius: 8px; 
            color: white; 
            text-decoration: none; 
            font-size: 1.3rem; 
            transition: transform 0.2s, background-color 0.3s, opacity 0.3s; 
        }
        .btn-contact:hover { transform: scale(1.06); opacity: 0.9; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-phone { background-color: #3498db; }

        footer { background-color: var(--bg-footer); color: white; text-align: center; padding: 35px 15px; margin-top: 50px; }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .footer-btn { background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; transition: background 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .footer-btn:hover { background: #1abc9c; }
        #footerCopy { font-size: 0.85rem; color: #bdc3c7; }

        @media (max-width: 580px) {
            header { padding: 110px 20px 35px 20px; }
            .logo-wrapper { top: 15px; right: 50%; transform: translateX(50%); }
            html[dir="ltr"] .logo-wrapper { left: 50%; right: auto; transform: translateX(-50%); }
            .controls-wrapper { top: 15px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); justify-content: space-between; }
            header h1 { font-size: 1.7rem; }
            .container { grid-template-columns: 1fr; padding: 0 15px 30px 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper">
        <img src="png.jpg" alt="Wad Real Estate Logo" class="brand-logo">
    </div>
    
    <div class="controls-wrapper">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="lang-btn" onclick="toggleLanguage()">
            <i class="fa-solid fa-globe"></i> <span id="langText">EN</span>
        </button>
    </div>
    <h1 id="headerTitle">شركة ود العقارية</h1>
    <p id="headerSub">ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة</p>
</header>

<section class="properties">
    <div id="propertiesContainer" class="container"></div>
</section>

<footer>
    <div class="footer-links">
        <a href="terms.html" class="footer-btn" id="footerLink1"><i class="fa-solid fa-gavel"></i> <span>الشروط والأحكام</span></a>
        <a href="https://maps.google.com" target="_blank" class="footer-btn" id="footerLink2"><i class="fa-solid fa-map-location-dot"></i> <span>مواقعنا على خرائط جوجل</span></a>
    </div>
    <p id="footerCopy">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzPjN2Dyd5CxQtXNoRTbZ4xMUB6toG_W6iaiKmPQGZm5e5d7SEHLD7B9bTqbM-MPsIm/exec";
const CACHE_KEY = "wd_properties_cache";
const CACHE_TIME_KEY = "wd_properties_cache_time";
const CACHE_DURATION = 5 * 60 * 1000; // كاش لمدة 5 دقائق لتسريع التحميل

const translations = {
    ar: {
        title: "شركة ود العقارية - WD Real Estate",
        headerTitle: "شركة ود العقارية",
        headerSub: "ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة",
        terms: "الشروط والأحكام",
        maps: "مواقعنا على خرائط جوجل",
        copy: "جميع الحقوق محفوظة © شركة ود العقارية 2026",
        viewDetails: "عرض التفاصيل",
        rooms: "غرف",
        baths: "حمام",
        errorTitle: "تعذر تحميل العقارات حالياً",
        errorSub: "يرجى التحقق من اتصال شبكة الإنترنت أو سلامة رابط الـ API المتصل بجوجل شيت."
    },
    en: {
        title: "WD Real Estate Company",
        headerTitle: "WD Real Estate",
        headerSub: "Find your dream apartment.. buy, sell, and rent with ease",
        terms: "Terms & Conditions",
        maps: "Our Locations on Google Maps",
        copy: "All Rights Reserved © WD Real Estate Company 2026",
        viewDetails: "View Details",
        rooms: "Rooms",
        baths: "Baths",
        errorTitle: "Unable to load properties currently",
        errorSub: "Please check your internet connection or the validity of the Google Sheet API link."
    }
};

let currentLang = "ar";
let cachedProperties = [];

const fallbackImages = [
    "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=600&auto=format&fit=crop",
    "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600&auto=format&fit=crop"
];

function initializeEyeAutomation() {
    document.querySelectorAll('.live-counter-eye').forEach(eye => {
        function scheduleNextToggle() {
            setTimeout(() => {
                eye.classList.toggle('is-visible');
                scheduleNextToggle();
            }, Math.floor(Math.random() * 120000) + 60000);
        }
        scheduleNextToggle();
        if(Math.random() > 0.5) eye.classList.add('is-visible');
    });
}

function renderProperties(properties) {
    const container = document.getElementById("propertiesContainer");
    let htmlContent = "";

    if (!properties || properties.length === 0) {
        showErrorMessage();
        return;
    }

    properties.forEach((property, index) => {
        // استقبال البيانات حسب الأعمدة المحددة من طرفك (يدعم العربية والإنجليزية)
        const pName = currentLang === "ar" ? (property["الاسم"] || property["Name"]) : (property["Name"] || property["الاسم"]);
        const pDesc = currentLang === "ar" ? (property["الوصف"] || property["Description"] || "لا يوجد وصف متوفر حالياً.") : (property["Description"] || property["الوصف"] || "No description available.");
        const pType = currentLang === "ar" ? (property["النوع"] || property["Type"] || "للبيع") : (property["Type"] || property["النوع"] || "For Sale");
        const badgeColor = property["لون العلامة"] || property["Badge Color"] || "#1abc9c";
        const pPrice = property["السعر"] || property["Price"] || "";
        const pRooms = property["الغرف"] || property["Rooms"] || 0;
        const pBaths = property["الحمامات"] || property["Bathrooms"] || 0;
        const pArea = property["المساحة"] || property["Area"] || "";
        const pPhone = property["الهاتف"] || property["Phone"] || "";
        const pWhatsapp = property["واتساب"] || property["Whatsapp"] || pPhone; // استخدام الهاتف كبديل للواتساب تلقائياً
        
        // جلب الصور الرئيسية وفصلها عند وجود فاصلة
        const mainMediaStr = property["الصور الرئيسية"] || property["الصورة الرئيسية"] || property["Image"] || "";
        const mainMediaUrl = mainMediaStr.split(',')[0].trim(); 

        let mediaHtml = "";
        if (mainMediaUrl.endsWith(".mp4") || mainMediaUrl.includes("video")) {
            mediaHtml = `<video src="${mainMediaUrl}" autoplay loop muted playsinline></video>`;
        } else if (mainMediaUrl !== "") {
            mediaHtml = `<img src="${mainMediaUrl}" alt="${pName}" loading="lazy">`;
        } else {
            mediaHtml = `<img src="${fallbackImages[index % fallbackImages.length]}" alt="${pName}" loading="lazy">`;
        }

        htmlContent += `
        <div class="property-card">
            <div class="property-image">
                <span class="badge" style="background-color: ${badgeColor};">${pType}</span>
                ${mediaHtml}
            </div>
            <div class="property-details">
                <div class="price-row">
                    <span class="price">${pPrice}</span>
                    <span class="live-counter-eye"><i class="fa-solid fa-eye"></i></span>
                </div>
                <h3 class="title">${pName}</h3>
                <p class="description">${pDesc}</p>
                <div class="features-icons">
                    <span class="icon-item"><i class="fa-solid fa-bed"></i> ${pRooms} ${translations[currentLang].rooms}</span>
                    <span class="icon-item"><i class="fa-solid fa-bath"></i> ${pBaths} ${translations[currentLang].baths}</span>
                    <span class="icon-item"><i class="fa-solid fa-ruler-combined"></i> ${pArea}</span>
                </div>
                <a href="apartment-details.html?id=${index}&lang=${currentLang}" class="view-details-btn">
                    ${translations[currentLang].viewDetails}
                </a>
                <div class="contact-buttons">
                    <a href="https://wa.me/${pWhatsapp}" target="_blank" class="btn-contact btn-whatsapp">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                    <a href="tel:${pPhone}" class="btn-contact btn-phone">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                </div>
            </div>
        </div>`;
    });

    container.innerHTML = htmlContent;
    initializeEyeAutomation();
}

function showErrorMessage() {
    document.getElementById("propertiesContainer").innerHTML = `
    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
        <h2 style="color: #e74c3c;">${translations[currentLang].errorTitle}</h2>
        <p style="color: var(--text-muted); margin-top:12px; font-size:1rem;">${translations[currentLang].errorSub}</p>
    </div>`;
}

async function loadProperties() {
    const cachedData = localStorage.getItem(CACHE_KEY);
    const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
    
    // محاولة التحميل من الذاكرة المحلية أولاً لتسريع الاستجابة
    if (cachedData && cachedTime && (Date.now() - cachedTime < CACHE_DURATION)) {
        cachedProperties = JSON.parse(cachedData);
        renderProperties(cachedProperties);
        return;
    }

    try {
        const response = await fetch(API_URL);
        cachedProperties = await response.json();
        localStorage.setItem(CACHE_KEY, JSON.stringify(cachedProperties));
        localStorage.setItem(CACHE_TIME_KEY, Date.now());
        renderProperties(cachedProperties);
    } catch (error) {
        console.error("Fetch API error:", error);
        if (cachedData) { // في حال فشل الاتصال، استخدم الكاش القديم كبديل أمان
            cachedProperties = JSON.parse(cachedData);
            renderProperties(cachedProperties);
        } else {
            showErrorMessage();
        }
    }
}

function toggleLanguage() {
    const html = document.getElementById("htmlPage");
    const langText = document.getElementById("langText");
    
    currentLang = currentLang === "ar" ? "en" : "ar";
    
    html.setAttribute("dir", currentLang === "en" ? "ltr" : "rtl");
    html.setAttribute("lang", currentLang);
    langText.innerText = currentLang === "en" ? "AR" : "EN";

    document.getElementById("pageTitle").innerText = translations[currentLang].title;
    document.getElementById("headerTitle").innerText = translations[currentLang].headerTitle;
    document.getElementById("headerSub").innerText = translations[currentLang].headerSub;
    document.querySelector("#footerLink1 span").innerText = translations[currentLang].terms;
    document.querySelector("#footerLink2 span").innerText = translations[currentLang].maps;
    document.getElementById("footerCopy").innerText = translations[currentLang].copy;

    if (cachedProperties.length > 0) renderProperties(cachedProperties);
    else showErrorMessage();
}

function toggleTheme() {
    const html = document.getElementById("htmlPage");
    const themeBtn = document.getElementById("themeBtn");
    
    if (html.getAttribute("data-theme") === "dark") {
        html.removeAttribute("data-theme");
        themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
    } else {
        html.setAttribute("data-theme", "dark");
        themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
    }
}

document.addEventListener("DOMContentLoaded", loadProperties);
</script>

</body>
</html>
