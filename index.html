<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">شركة ود العقارية - WD Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-card: #fff;
            --border-card: #e2f0ea;
            --bg-features: #f8f9fa;
            --text-features: #555;
            --bg-header: #1a252f;
            --bg-footer: #1a252f;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-card: #1e1e1e;
            --border-card: #2c3e50;
            --bg-features: #2a2a2a;
            --text-features: #ccc;
            --bg-header: #0a0f14;
            --bg-footer: #0a0f14;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; 
        }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }

        header { 
            background-color: var(--bg-header); 
            color: #fff; 
            text-align: center; 
            padding: 60px 20px 40px 20px; 
            margin-bottom: 30px; 
            position: relative; 
        }
        header h1 { font-size: 2rem; line-height: 1.4; }
        header p { color: #1abc9c; margin-top: 10px; font-size: 1rem; }

        .controls-wrapper { 
            position: absolute; 
            top: 15px; 
            left: 20px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
            z-index: 10;
        }
        html[dir="ltr"] .controls-wrapper { left: auto; right: 20px; }

        .lang-btn, .theme-btn { 
            background: #1abc9c; 
            color: #fff; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            height: 32px;
        }
        .lang-btn:hover, .theme-btn:hover { background: #16a085; }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 15px 40px 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .property-card { 
            background: var(--bg-card);
            border-radius: 8px; 
            overflow: hidden; 
            border: 3px solid var(--border-card); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; 
            display: flex; 
            flex-direction: column; 
        }
        .property-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.15); 
            border-color: #1abc9c; 
        }

        .property-image { 
            position: relative; 
            width: 100%; 
            height: 200px; 
            overflow: hidden; 
            background: #eef2f5; 
        }
        .property-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .property-card:hover .property-image img { transform: scale(1.05); }

        .badge { position: absolute; top: 15px; right: 15px; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; z-index: 2; }
        html[dir="ltr"] .badge { right: auto; left: 15px; }
        .badge-sale { background: #1abc9c; }
        .badge-rent { background: #e67e22; }

        .property-details { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .price { color: #e74c3c; font-size: 1.25rem; font-weight: 700; }
        
        .live-counter {
            color: #e74c3c;
            font-size: 0.9rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(231, 76, 60, 0.08);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .live-counter i {
            animation: pulseEye 2s infinite ease-in-out;
        }

        @keyframes pulseEye {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: var(--text-title); line-height: 1.4; }
        
        .description { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-bottom: 15px; 
            line-height: 1.6; 
            height: 75px; 
            overflow: hidden; 
            display: -webkit-box; 
            -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; 
        }

        .features-icons { 
            display: flex; 
            justify-content: space-between; 
            background: var(--bg-features); 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            font-size: 0.8rem; 
            color: var(--text-features); 
            gap: 5px;
        }
        .icon-item { display: flex; align-items: center; white-space: nowrap; }
        .icon-item i { color: #1abc9c; }
        html[dir="rtl"] .icon-item i { margin-left: 5px; }
        html[dir="ltr"] .icon-item i { margin-right: 5px; }

        .view-details-btn { display: block; text-align: center; background: #2c3e50; color: white; text-decoration: none; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-weight: 600; font-size: 0.9rem; transition: background 0.3s; }
        .view-details-btn:hover { background: #1abc9c; }

        .contact-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-contact { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px; 
            border-radius: 8px; 
            color: white; 
            text-decoration: none; 
            font-size: 1.3rem; 
            transition: transform 0.2s ease, background-color 0.3s, opacity 0.3s; 
        }
        .btn-contact:hover { 
            transform: scale(1.08);
            opacity: 0.9;
        }
        .btn-whatsapp { background-color: #25D366; }
        .btn-phone { background-color: #3498db; }
        .btn-facebook { background-color: #1877F2; }

        footer { background-color: var(--bg-footer); color: white; text-align: center; padding: 30px 15px; margin-top: 40px; }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .footer-btn { background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; transition: background 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .footer-btn:hover { background: #1abc9c; }
        #footerCopy { font-size: 0.85rem; color: #bdc3c7; }

        @media (max-width: 360px) {
            header h1 { font-size: 1.6rem; }
            .features-icons { flex-direction: column; gap: 8px; align-items: flex-start; }
            .container { grid-template-columns: 1fr; }
            .price-row { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <div class="controls-wrapper">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button class="lang-btn" onclick="toggleLanguage()">
            <i class="fa-solid fa-globe"></i> <span id="langText">EN</span>
        </button>
    </div>
    <h1 id="headerTitle">شركة ود العقارية</h1>
    <p id="headerSub">ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة</p>
</header>

<section class="properties">
    <div id="propertiesContainer" class="container"></div>
</section>

<footer>
    <div class="footer-links">
        <a href="terms.html" class="footer-btn" id="footerLink1"><i class="fa-solid fa-gavel"></i> <span>الشروط والأحكام</span></a>
        <a href="https://maps.google.com" target="_blank" class="footer-btn" id="footerLink2"><i class="fa-solid fa-map-location-dot"></i> <span>مواقعنا على خرائط جوجل</span></a>
    </div>
    <p id="footerCopy">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw8v0zjdnEYpF3iLiJP2lIpJ5GsEu9nW8977wmEOPyZ1k4F7xMb9Sjq1GmQ3U_12Q5S/exec";

// قاموس الترجمة الثابتة للعناصر الأساسية بالصفحة
const translations = {
    ar: {
        title: "شركة ود العقارية - WD Real Estate",
        headerTitle: "شركة ود العقارية",
        headerSub: "ابحث عن شقة أحلامك.. بيع، شراء، وتأجير بكل سهولة",
        terms: "الشروط والأحكام",
        maps: "مواقعنا على خرائط جوجل",
        copy: "جميع الحقوق محفوظة © شركة ود العقارية 2026",
        viewDetails: "عرض التفاصيل",
        rooms: "غرف",
        baths: "حمام",
        watching: "يشاهدون الآن",
        errorTitle: "تعذر تحميل العقارات حالياً",
        errorSub: "يرجى التحقق من اتصال شبكة الإنترنت أو سلامة رابط الـ API المتصل بجوجل شيت."
    },
    en: {
        title: "WD Real Estate Company",
        headerTitle: "WD Real Estate",
        headerSub: "Find your dream apartment.. buy, sell, and rent with ease",
        terms: "Terms & Conditions",
        maps: "Our Locations on Google Maps",
        copy: "All Rights Reserved © WD Real Estate Company 2026",
        viewDetails: "View Details",
        rooms: "Rooms",
        baths: "Baths",
        watching: "watching now",
        errorTitle: "Unable to load properties currently",
        errorSub: "Please check your internet connection or the validity of the Google Sheet API link."
    }
};

let currentLang = "ar";
let cachedProperties = [];

function getRandomViews() {
    return Math.floor(Math.random() * (45 - 12 + 1)) + 12;
}

// دالة بناء بطاقات العقار وتصييرها حسب اللغة النشطة
function renderProperties(properties) {
    const container = document.getElementById("propertiesContainer");
    container.innerHTML = "";

    if (!properties || properties.length === 0) {
        showErrorMessage();
        return;
    }

    properties.forEach(property => {
        // آلية فحص مرنة للمفاتيح لتجنب اختلاف تسميات الأعمدة في Google Sheet
        const pName = property["الاسم"] || property["Name"] || "";
        const pPrice = property["السعر"] || property["Price"] || "";
        const pType = property["النوع"] || property["Type"] || "للبيع";
        const pDesc = property["الوصف"] || property["Description"] || "";
        const pRooms = property["الغرف"] || property["الغرفة"] || property["Rooms"] || 0;
        const pBaths = property["الحمامات"] || property["الحمام"] || property["Bathrooms"] || 0;
        const pArea = property["المساحة"] || property["Area"] || "";
        const pImg = property["الصورة الرئيسية"] || property["Image"] || "https://via.placeholder.com/400x250";
        const pId = property["id"] || property["ID"] || "";
        
        const pWhatsapp = property["واتساب"] || property["Whatsapp"] || "";
        const pPhone = property["الهاتف"] || property["Phone"] || "";
        const pFacebook = property["فيسبوك"] || property["Facebook"] || "#";

        const isRent = pType.includes("إيجار") || pType.toLowerCase().includes("rent");
        const badgeClass = isRent ? "badge-rent" : "badge-sale";

        container.innerHTML += `
        <div class="property-card">
            <div class="property-image">
                <span class="badge ${badgeClass}">${pType}</span>
                <img src="${pImg}" alt="${pName}">
            </div>
            
            <div class="property-details">
                <div class="price-row">
                    <span class="price">${pPrice}</span>
                    <span class="live-counter">
                        <i class="fa-solid fa-eye"></i> <span>${getRandomViews()} ${translations[currentLang].watching}</span>
                    </span>
                </div>
                
                <h3 class="title">${pName}</h3>
                <p class="description">${pDesc}</p>
                
                <div class="features-icons">
                    <span class="icon-item"><i class="fa-solid fa-bed"></i> ${pRooms} ${translations[currentLang].rooms}</span>
                    <span class="icon-item"><i class="fa-solid fa-bath"></i> ${pBaths} ${translations[currentLang].baths}</span>
                    <span class="icon-item"><i class="fa-solid fa-ruler-combined"></i> ${pArea}</span>
                </div>
                
                <a href="apartment-details.html?id=${pId}&lang=${currentLang}" class="view-details-btn">
                    ${translations[currentLang].viewDetails}
                </a>
                
                <div class="contact-buttons">
                    <a href="https://wa.me/${pWhatsapp}" target="_blank" class="btn-contact btn-whatsapp">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                    <a href="tel:${pPhone}" class="btn-contact btn-phone">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                    <a href="${pFacebook}" target="_blank" class="btn-contact btn-facebook">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                </div>
            </div>
        </div>`;
    });
}

function showErrorMessage() {
    const container = document.getElementById("propertiesContainer");
    container.innerHTML = `
    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
        <h2 style="color: #e74c3c;">${translations[currentLang].errorTitle}</h2>
        <p style="color: var(--text-muted); margin-top:10px;">${translations[currentLang].errorSub}</p>
    </div>`;
}

async function loadProperties() {
    try {
        const response = await fetch(API_URL);
        cachedProperties = await response.json();
        renderProperties(cachedProperties);
    } catch (error) {
        console.error("Fetch operational error:", error);
        showErrorMessage();
    }
}

// دالة تحويل اللغات الكاملة مع تعديل نصوص الـ DOM والاتجاهات
function toggleLanguage() {
    const html = document.getElementById("htmlPage");
    const langText = document.getElementById("langText");
    
    currentLang = currentLang === "ar" ? "en" : "ar";
    
    // تحديث خصائص الاتجاهات وهيكل الصفحة
    if (currentLang === "en") {
        html.setAttribute("dir", "ltr");
        html.setAttribute("lang", "en");
        langText.innerText = "AR";
    } else {
        html.setAttribute("dir", "rtl");
        html.setAttribute("lang", "ar");
        langText.innerText = "EN";
    }

    // ترجمة العناصر الثابتة بالصفحة
    document.getElementById("pageTitle").innerText = translations[currentLang].title;
    document.getElementById("headerTitle").innerText = translations[currentLang].headerTitle;
    document.getElementById("headerSub").innerText = translations[currentLang].headerSub;
    document.querySelector("#footerLink1 span").innerText = translations[currentLang].terms;
    document.querySelector("#footerLink2 span").innerText = translations[currentLang].maps;
    document.getElementById("footerCopy").innerText = translations[currentLang].copy;

    // إعادة تصيير بطاقات العقارات بناءً على اللغة الجديدة
    if (cachedProperties.length > 0) {
        renderProperties(cachedProperties);
    } else {
        showErrorMessage();
    }
}

function toggleTheme() {
    const html = document.getElementById("htmlPage");
    const themeBtn = document.getElementById("themeBtn");
    
    if (html.getAttribute("data-theme") === "dark") {
        html.removeAttribute("data-theme");
        themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
    } else {
        html.setAttribute("data-theme", "dark");
        themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
    }
}

document.addEventListener("DOMContentLoaded", loadProperties);

// حماية الشفرة البرمجية ومنع التفتيش
document.addEventListener('contextmenu', event => event.preventDefault());
document.addEventListener('keydown', event => {
    if (event.key === 'F12' || event.keyCode === 123) event.preventDefault();
    if (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'C')) event.preventDefault();
    if (event.ctrlKey && (event.key === 'u' || event.key === 'U')) event.preventDefault();
});
</script>

</body>
</html>
