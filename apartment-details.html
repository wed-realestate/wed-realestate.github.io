<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">تفاصيل العقار - شركة ود العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-nav: #1a252f;
            --bg-section: #fff;
            --border-card: #e2f0ea;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-nav: #0a0f14;
            --bg-section: #1e1e1e;
            --border-card: #2c3e50;
            --shadow: rgba(0,0,0,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        header { 
            background-color: var(--bg-nav);
            color: #fff; 
            text-align: center; 
            padding: 40px 20px; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header-content { text-align: center; }
        header h1 { font-size: 2rem; line-height: 1.4; }
        header p { color: #1abc9c; margin-top: 5px; font-size: 1rem; }

        .logo-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #1abc9c;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .brand-logo { width: 20%; height: 20%; object-fit: cover; }

        .controls-wrapper { 
            position: absolute;
            top: 15px; 
            left: 20px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        html[dir="ltr"] .controls-wrapper { left: auto; right: 20px; }

        .back-btn-nav, .lang-btn, .theme-btn { 
            background: #1abc9c;
            color: #fff; 
            border: none; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center;
            gap: 5px; 
            height: 32px;
            text-decoration: none;
        }
        .back-btn-nav:hover, .lang-btn:hover, .theme-btn:hover { background: #16a085; }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .section-block {
            background: var(--bg-section);
            border: 3px solid var(--border-card);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-title);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--border-card);
            padding-bottom: 8px;
        }

        .section-title i { color: #1abc9c; }
        .main-info { text-align: center; }
        .main-info h2 { font-size: 1.6rem; color: var(--text-title); margin-bottom: 10px; }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border-card);
        }

        .contact-section-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .btn-action {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-whatsapp { background-color: #25D366; }
        .btn-phone { background-color: #3498db; }
        .btn-facebook { background-color: #1877F2; }

        .status-msg {
            text-align: center;
            padding: 50px 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        footer { 
            background-color: var(--bg-nav); 
            color: white; 
            text-align: center; 
            padding: 30px 15px; 
            margin-top: 40px; 
        }
        #footerCopy { font-size: 0.85rem; color: #bdc3c7; }

        @media (max-width: 600px) {
            header { padding: 30px 15px; gap: 10px; }
            .controls-wrapper { position: static; margin-bottom: 10px; }
            .contact-section-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="controls-wrapper">
            <a href="index.html" class="back-btn-nav" id="backBtn">
                <i class="fa-solid fa-arrow-right"></i> <span class="data-text">الرئيسية</span>
            </a>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="lang-btn" onclick="toggleLanguage()">
                <i class="fa-solid fa-globe"></i> <span id="langText">EN</span>
            </button>
        </div>
        <div class="logo-wrapper">
            <img src="jpg.jpeg" alt="Wed Logo" class="brand-logo">
        </div>
        <div class="header-content">
            <h1 id="companyName">شركة ود العقارية</h1>
            <p id="headerSub">المعاينة المرئية وصور العقار والموقع</p>
        </div>
    </header>

    <main class="container" id="mainContainer">
        <div class="status-msg" id="statusMessage">
            <i class="fa-solid fa-circle-notch fa-spin"></i> جاري جلب تفاصيل المعاينة...
        </div>
    </main>

    <footer>
        <p id="footerCopy">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
    </footer>

    <script>
    const translations = {
        ar: {
            pageTitle: "معاينة العقار - شركة ود العقارية",
            companyName: "شركة ود العقارية",
            headerSub: "المعاينة المرئية وصور العقار والموقع",
            backBtn: "الرئيسية",
            videoTitle: "المعاينة المرئية (فيديو)",
            galleryTitle: "معرض الصور الإضافية",
            mapTitle: "الموقع الجغرافي للعقار",
            footerText: "جميع الحقوق محفوظة © شركة ود العقارية 2026",
            loading: "جاري جلب تفاصيل المعاينة...",
            error: "عذراً، لم يتم العثور على الوسائط المطلوبة للعقار أو هناك خلل في الاتصال."
        },
        en: {
            pageTitle: "Property Media - Wed Real Estate",
            companyName: "Wed Real Estate",
            headerSub: "Video presentation, photo gallery & map location",
            backBtn: "Home",
            videoTitle: "Video Presentation",
            galleryTitle: "Photo Gallery",
            mapTitle: "Property Location",
            footerText: "All Rights Reserved © Wed Real Estate 2026",
            loading: "Loading property media...",
            error: "Sorry, the requested property media was not found or connection failed."
        }
    };

    let currentLang = localStorage.getItem('selectedLang') || 'ar';
    let currentPropertyData = null;

    // بنك البيانات الاحتياطية والعشوائية في حال عدم توفر البيانات في الخانات
    const fallbackVideos = [
        "https://www.youtube.com/embed/dQw4w9WgXcQ"
    ];
    const fallbackMaps = [
        "https://maps.google.com/maps?q=Riyadh&t=&z=13&ie=UTF8&iwloc=&output=embed"
    ];
    const fallbackImages = [
        "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=500&q=80",
        "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=500&q=80"
    ];

    document.addEventListener("DOMContentLoaded", () => {
        setLanguage(currentLang); 
        fetchPropertyDetails();
    });

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        localStorage.setItem('selectedLang', currentLang);
        setLanguage(currentLang);
    }

    function setLanguage(lang) {
        const html = document.getElementById('htmlPage');
        html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        html.setAttribute('lang', lang);

        document.title = translations[lang].pageTitle;
        document.getElementById('companyName').textContent = translations[lang].companyName;
        document.getElementById('headerSub').textContent = translations[lang].headerSub;
        document.getElementById('footerCopy').textContent = translations[lang].footerText;
        
        const backText = document.querySelector('#backBtn .data-text');
        if (backText) backText.textContent = translations[lang].backBtn;
        
        const backIcon = document.querySelector('#backBtn i');
        if (backIcon) {
            backIcon.className = lang === 'ar' ? 'fa-solid fa-arrow-right' : 'fa-solid fa-arrow-left';
        }

        document.getElementById('langText').textContent = lang === 'ar' ? 'EN' : 'AR';

        if (currentPropertyData) {
            renderDetails(currentPropertyData);
        }
    }

    const htmlElement = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);

    function setTheme(theme) {
        htmlElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        const themeBtn = document.getElementById('themeBtn');
        if (themeBtn) {
            themeBtn.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        }
    }

    function toggleTheme() {
        const currentTheme = htmlElement.getAttribute('data-theme');
        setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    // دالة جلب البيانات الفورية مع دعم هيكل كاش index.html الجديد تماماً
    async function fetchPropertyDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('id');

        if (!propertyId) {
            showError();
            return;
        }

        // 1. محاولة فك وقراءة الكاش الفوري المشترك والمخزن بواسطة index.html
        const localCache = localStorage.getItem('properties_cache');
        if (localCache) {
            try {
                let parsedCache = JSON.parse(localCache);
                // التعامل مع الكاش سواء كان مصفوفة مباشرة أو مصفوفة بداخل كائن داتا
                let itemsArray = Array.isArray(parsedCache) ? parsedCache : (parsedCache.data || []);
                
                const found = itemsArray.find(item => (item.ID || item.id || "").toString() === propertyId.toString());
                if (found) {
                    currentPropertyData = found;
                    renderDetails(found);
                    return; // تم العثور على العقار من الكاش الفوري بنجاح!
                }
            } catch(e) {
                console.error("خطأ في قراءة كاش البيانات:", e);
            }
        }

        // 2. إذا لم يتوفر كاش فوري، يتم التوجه فوراً وبسرعة لجلب البيانات من السيرفر
        try {
            const API_URL = "https://script.google.com/macros/s/AKfycbyKnzlHWNG-yBjR5fg2_D5YkuTNyUgJ7m8H5kRLtQIH8HkMqZwAI7CE6b2shCr98b7o/exec";
            const response = await fetch(API_URL);
            const data = await response.json();
            
            let targetArray = [];
            if (data && data.status === "success" && data.data) {
                targetArray = data.data;
            } else if (Array.isArray(data)) {
                targetArray = data;
            }

            const found = targetArray.find(item => (item.ID || item.id || "").toString() === propertyId.toString());
            
            if (found) {
                currentPropertyData = found;
                renderDetails(found);
            } else {
                showError();
            }
        } catch (err) {
            console.error(err);
            showError();
        }
    }

    function showError() {
        document.getElementById('mainContainer').innerHTML = `<div class="status-msg" style="color:#e74c3c;"><i class="fa-solid fa-triangle-exclamation"></i> ${translations[currentLang].error}</div>`;
    }

    function optimizeVideoUrl(url) {
        if (!url) return "";
        if (url.includes('youtube.com/watch')) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                return `https://www.youtube.com/embed/${match[2]}`;
            }
        } else if (url.includes('youtu.be/')) {
            const id = url.split('youtu.be/')[1].split('?')[0];
            return `https://www.youtube.com/embed/${id}`;
        }
        return url;
    }

    function renderDetails(item) {
        const mainContainer = document.getElementById('mainContainer');
        
        // فحص الخانات بمرونة وبأكثر من مسمى لضمان التطابق التام مع الكاش الممرر من الصفحة الرئيسية
        const title = item.العقار || item.title || item.Name || "عقار شركة ود";
        
        let rawVideo = item.الفيديو || item.video || item.رابط_الفيديو || "";
        let videoUrl = optimizeVideoUrl(rawVideo);
        
        let mapUrl = item.الخريطة || item.map || item.الموقع || "";
        let rawGallery = item.المعرض || item.gallery || item.الصور || "";

        // تطبيق خطة التعبئة الاحتياطية في حال خلو الخانات في الشيت
        if (!videoUrl || videoUrl.trim() === "") {
            videoUrl = fallbackVideos[0];
        }
        
        if (!mapUrl || mapUrl.trim() === "" || mapUrl.includes("googleusercontent.com")) {
            mapUrl = fallbackMaps[0];
        }

        let galleryHTML = "";
        if (rawGallery && rawGallery.trim() !== "") {
            const images = rawGallery.split(',');
            images.forEach(imgSrc => {
                if(imgSrc.trim()) {
                    galleryHTML += `<img src="${imgSrc.trim()}" class="gallery-item" alt="Gallery Image" onclick="window.open('${imgSrc.trim()}', '_blank')">`;
                }
            });
        } else {
            fallbackImages.forEach(imgSrc => {
                galleryHTML += `<img src="${imgSrc}" class="gallery-item" alt="Fallback Image" onclick="window.open('${imgSrc}', '_blank')">`;
            });
        }

        let htmlContent = `
            <div class="section-block">
                <div class="main-info">
                    <h2>${title}</h2>
                </div>
            </div>
        `;

        // 1. عرض مشغل الفيديو المباشر
        htmlContent += `
            <div class="section-block">
                <div class="section-title"><i class="fa-solid fa-video"></i> ${translations[currentLang].videoTitle}</div>
                <div class="video-container">
                    <iframe src="${videoUrl}" allowfullscreen></iframe>
                </div>
            </div>
        `;

        // 2. عرض معرض الصور الإضافية المتناسق
        htmlContent += `
            <div class="section-block">
                <div class="section-title"><i class="fa-solid fa-images"></i> ${translations[currentLang].galleryTitle}</div>
                <div class="gallery-grid">
                    ${galleryHTML}
                </div>
            </div>
        `;

        // 3. عرض خريطة الموقع الجغرافي التفاعلية
        htmlContent += `
            <div class="section-block">
                <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> ${translations[currentLang].mapTitle}</div>
                <div class="video-container">
                    <iframe src="${mapUrl}" allowfullscreen loading="lazy"></iframe>
                </div>
            </div>
        `;

        // أزرار الاتصال السريع الثابتة بالأسفل
        htmlContent += `
            <div class="contact-section-buttons">
                <a href="https://wa.me/201234567890" target="_blank" class="btn-action btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                <a href="tel:+201234567890" class="btn-action btn-phone"><i class="fa-solid fa-phone"></i> Call</a>
                <a href="https://facebook.com/yourpage" target="_blank" class="btn-action btn-facebook"><i class="fa-brands fa-facebook-f"></i> Facebook</a>
            </div>
        `;

        mainContainer.innerHTML = htmlContent;
    }
    </script>
</body>
</html>
