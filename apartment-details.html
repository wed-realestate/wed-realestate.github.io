<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">تفاصيل العقار - شركة ود العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* تعريف متغيرات الألوان للنظامين */
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-nav: #1a252f;
            --bg-section: #fff;
            --border-card: #e2f0ea;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-nav: #0a0f14;
            --bg-section: #1e1e1e;
            --border-card: #2c3e50;
            --shadow: rgba(0,0,0,0.3);
        }

        /* إضافة تنعيم وتأثير انتقال شامل للعناصر الأساسية */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 40px; }

        /* شريط التنقل العلوي */
        .nav-bar { background-color: var(--bg-nav); padding: 15px 20px; }
        .nav-container { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-controls { display: flex; gap: 10px; align-items: center; }

        .back-btn { background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; transition: background 0.3s ease, transform 0.2s ease; }
        .back-btn:hover { background: #1abc9c; transform: translateX(-3px); }
        html[dir="ltr"] .back-btn:hover { transform: translateX(3px); }

        /* أزرار التحكم العلوي */
        .lang-btn, .theme-btn { background: #1abc9c; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: background 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); height: 35px; }
        .lang-btn:hover, .theme-btn:hover { background: #16a085; transform: scale(1.05); }
        .theme-btn:active, .lang-btn:active { transform: scale(0.95); }

        .main-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        /* الصناديق المتجاوبة مع تأثير النعومة عند التفاعل */
        .section-box { background: var(--bg-section); padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px var(--shadow); margin-bottom: 25px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .section-box:hover { transform: translateY(-2px); box-shadow: 0 15px 30px var(--shadow); }
        
        .section-title { font-size: 1.2rem; color: var(--text-title); margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #1abc9c; }

        /* مشغل الفيديو والخريطة الدائري والمتناسق */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* معرض الصور مع تأثير التلاشي والانتقال الحر */
        .gallery-main { width: 100%; height: 400px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; background: #eee; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.2s ease-in-out, transform 0.5s ease; }
        .gallery-main:hover img { transform: scale(1.02); }
        
        /* حالة التلاشي أثناء تبديل الصورة عبر الـ JavaScript */
        .gallery-main img.fade-out { opacity: 0; }

        /* شبكة الصور المصغرة وتأثيراتها */
        .thumbnails-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .thumb { width: 100%; height: 80px; border-radius: 6px; object-fit: cover; cursor: pointer; opacity: 0.5; border: 2px solid transparent; transition: opacity 0.3s ease, border-color 0.3s ease, transform 0.3s ease; }
        .thumb:hover { opacity: 0.8; transform: translateY(-2px); }
        .thumb.active { opacity: 1; border-color: #1abc9c; transform: scale(1.03) translateY(-2px); }

        /* أزرار اتصالات الخدمة السريعة */
        .contact-section-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 25px;
        }
        .btn-action {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-whatsapp { background-color: #25D366; }
        .btn-phone { background-color: #3498db; }
        .btn-facebook { background-color: #1877F2; }

        .status-msg { text-align: center; padding: 50px 20px; font-size: 1.2rem; font-weight: bold; }

        footer { background-color: var(--bg-nav); color: white; text-align: center; padding: 25px 10px; margin-top: 40px; }
        footer p { font-size: 0.9rem; }

        html[dir="ltr"] #backIcon { transform: rotate(180deg); }

        @media (max-width: 576px) {
            .gallery-main { height: 250px; }
            .thumb { height: 60px; }
            .contact-section-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-container">
        <a href="index.html" class="back-btn" id="backBtn">
            <i class="fa-solid fa-arrow-right" id="backIcon"></i> 
            <span class="data-text">العودة للرئيسية</span>
        </a>
        <div class="nav-controls">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="lang-btn" onclick="toggleLanguage()">
                <i class="fa-solid fa-globe"></i> 
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</div>

<main class="main-container" id="mainContainer">
    <div class="status-msg" id="statusMessage">
        <i class="fa-solid fa-circle-notch fa-spin"></i> جاري جلب تفاصيل المعاينة...
    </div>
</main>

<footer>
    <p id="footerText">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
</footer>

<script>
// ==========================================
// ميزة الحماية: منع الزر الأيمن والاختصارات
// ==========================================
document.addEventListener('contextmenu', (e) => e.preventDefault());
document.addEventListener('keydown', (e) => {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) { e.preventDefault(); return false; }
    if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); return false; }
});

// دالة تغيير الصور المصغرة مع تأثير التلاشي السلس الـ (Fade Effect)
function changeImage(element) {
    const mainImg = document.getElementById('mainImage');
    if (!mainImg || mainImg.src === element.src) return;

    mainImg.classList.add('fade-out');
    setTimeout(() => {
        mainImg.src = element.src;
        mainImg.classList.remove('fade-out');
    }, 200); 

    let thumbs = document.getElementsByClassName('thumb');
    for(let i=0; i<thumbs.length; i++) {
        thumbs[i].classList.remove('active');
    }
    element.classList.add('active');
}

// قاموس النصوص الكامل للغتين
const translations = {
    ar: {
        pageTitle: "تفاصيل العقار - شركة ود العقارية",
        backBtn: "العودة للرئيسية",
        companyName: "شركة ود العقارية",
        videoTitle: "فيديو المعاينة الحية",
        galleryTitle: "معرض الصور الفوتوغرافية",
        mapTitle: "الموقع على خرائط جوجل",
        footerText: "جميع الحقوق محفوظة © شركة ود العقارية 2026",
        langBtn: "EN",
        error: "عذراً، لم يتم العثور على العقار المطلوب أو هناك خلل في الاتصال."
    },
    en: {
        pageTitle: "Property Details - Wed Real Estate",
        backBtn: "Back to Home",
        companyName: "Wed Real Estate",
        videoTitle: "Live Preview Video",
        galleryTitle: "Photo Gallery",
        mapTitle: "Google Maps Location",
        footerText: "All Rights Reserved © Wed Real Estate 2026",
        langBtn: "AR",
        error: "Sorry, the requested property was not found or connection failed."
    }
};

let currentLang = localStorage.getItem('selectedLang') || 'ar';
let currentPropertyData = null;

// بنك البيانات الاحتياطية (العشوائية) للتغذية التلقائية الفورية
const fallbackVideos = ["https://www.youtube.com/embed/dQw4w9WgXcQ"];
const fallbackMaps = ["https://maps.google.com/maps?q=Cairo&t=&z=13&ie=UTF8&iwloc=&output=embed"];
const fallbackImages = [
    "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=500&q=80",
    "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=500&q=80",
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=500&q=80",
    "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=500&q=80"
];

document.addEventListener("DOMContentLoaded", () => {
    setLanguage(currentLang); 
    fetchPropertyDetails();
});

function toggleLanguage() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('selectedLang', currentLang);
    setLanguage(currentLang);
}

function setLanguage(lang) {
    const html = document.getElementById('htmlPage');
    html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    html.setAttribute('lang', lang);

    document.title = translations[lang].pageTitle;
    document.getElementById('footerText').textContent = translations[lang].footerText;
    document.getElementById('langText').textContent = translations[lang].langBtn;
    
    const backBtnText = document.querySelector('#backBtn .data-text');
    if (backBtnText) backBtnText.textContent = translations[lang].backBtn;

    const backIcon = document.getElementById('backIcon');
    if (backIcon) backIcon.className = lang === 'ar' ? 'fa-solid fa-arrow-right' : 'fa-solid fa-arrow-left';

    if (currentPropertyData) {
        renderDetails(currentPropertyData);
    }
}

// إعدادات المظهر والوضع الليلي
const htmlElement = document.documentElement;
const savedTheme = localStorage.getItem('theme') || 'light';
setTheme(savedTheme);

function setTheme(theme) {
    htmlElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const themeBtn = document.getElementById('themeBtn');
    if (themeBtn) themeBtn.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
}

function toggleTheme() {
    setTheme(htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// دالة جلب وإيصال البيانات الفورية المتزامنة مع index.html
async function fetchPropertyDetails() {
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = urlParams.get('id');

    if (!propertyId) { showError(); return; }

    const localCache = localStorage.getItem('properties_cache');
    if (localCache) {
        try {
            let parsedCache = JSON.parse(localCache);
            let itemsArray = Array.isArray(parsedCache) ? parsedCache : (parsedCache.data || []);
            const found = itemsArray.find(item => (item.ID || item.id || "").toString() === propertyId.toString());
            if (found) { currentPropertyData = found; renderDetails(found); return; }
        } catch(e) { console.error(e); }
    }

    try {
        const API_URL = "https://script.google.com/macros/s/AKfycbyKnzlHWNG-yBjR5fg2_D5YkuTNyUgJ7m8H5kRLtQIH8HkMqZwAI7CE6b2shCr98b7o/exec";
        const response = await fetch(API_URL);
        const data = await response.json();
        let targetArray = Array.isArray(data) ? data : (data.data || []);

        const found = targetArray.find(item => (item.ID || item.id || "").toString() === propertyId.toString());
        if (found) { currentPropertyData = found; renderDetails(found); } else { renderDetails({ id: propertyId }); }
    } catch (err) {
        console.error(err);
        renderDetails({ id: propertyId });
    }
}

function showError() {
    document.getElementById('mainContainer').innerHTML = `<div class="status-msg" style="color:#e74c3c;"><i class="fa-solid fa-triangle-exclamation"></i> ${translations[currentLang].error}</div>`;
}

function optimizeVideoUrl(url) {
    if (!url) return "";
    if (url.includes('youtube.com/watch')) {
        const match = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
        if (match && match[2].length === 11) return `https://www.youtube.com/embed/${match[2]}`;
    } else if (url.includes('youtu.be/')) {
        return `https://www.youtube.com/embed/${url.split('youtu.be/')[1].split('?')[0]}`;
    }
    return url;
}

function renderDetails(item) {
    const mainContainer = document.getElementById('mainContainer');
    const title = item.العقار || item.title || item.Name || "تفاصيل ومعاينة الشقة";
    
    let videoUrl = optimizeVideoUrl(item.الفيديو || item.video || item.رابط_الفيديو || "");
    let mapUrl = item.الخريطة || item.map || item.الموقع || "";
    let rawGallery = item.المعرض || item.gallery || item.الصور || "";

    if (!videoUrl) videoUrl = fallbackVideos[0];
    if (!mapUrl || mapUrl.trim() === "" || !mapUrl.includes("embed")) mapUrl = fallbackMaps[0];

    // تجميع الصور لشبكة الـ Thumbnails الفاخرة المأخوذة من كود العرض الجديد
    let imgList = [];
    if (rawGallery && rawGallery.trim() !== "") {
        imgList = rawGallery.split(',').map(img => img.trim()).filter(img => img);
    }
    if (imgList.length === 0) imgList = fallbackImages;

    // بناء كود شبكة المعرض الديناميكية
    let mainImageSrc = imgList[0];
    let thumbnailsHTML = "";
    imgList.forEach((imgSrc, index) => {
        thumbnailsHTML += `<img class="thumb ${index === 0 ? 'active' : ''}" src="${imgSrc}" onclick="changeImage(this)" loading="lazy">`;
    });

    let htmlContent = `
        <div style="margin-bottom: 30px;">
            <h1 style="color: var(--text-title); font-size: 1.8rem; font-weight: 700; margin-bottom: 5px;">${title}</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem;">${translations[currentLang].companyName}</p>
        </div>

        <div class="section-box">
            <div class="section-title"><i class="fa-solid fa-circle-play"></i> <span>${translations[currentLang].videoTitle}</span></div>
            <div class="video-container">
                <iframe src="${videoUrl}" allowfullscreen></iframe>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title"><i class="fa-solid fa-images"></i> <span>${translations[currentLang].galleryTitle}</span></div>
            <div class="gallery-main">
                <img id="mainImage" src="${mainImageSrc}" alt="المعروض الرئيسي">
            </div>
            <div class="thumbnails-grid">
                ${thumbnailsHTML}
            </div>
        </div>

        <div class="section-box">
            <div class="section-title"><i class="fa-solid fa-map-location-dot"></i> <span>${translations[currentLang].mapTitle}</span></div>
            <div class="video-container">
                <iframe src="${mapUrl}" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>

        <div class="contact-section-buttons">
            <a href="https://wa.me/201234567890" target="_blank" class="btn-action btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
            <a href="tel:+201234567890" class="btn-action btn-phone"><i class="fa-solid fa-phone"></i> Call</a>
            <a href="https://facebook.com/yourpage" target="_blank" class="btn-action btn-facebook"><i class="fa-brands fa-facebook-f"></i> Facebook</a>
        </div>
    `;

    mainContainer.innerHTML = htmlContent;
}
</script>
</body>
</html>
