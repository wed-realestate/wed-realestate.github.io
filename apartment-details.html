<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">تفاصيل العقار - شركة ود العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* تعريف متغيرات الألوان للنظامين */
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-nav: #1a252f;
            --bg-section: #fff;
            --border-card: #e2f0ea;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-nav: #0a0f14;
            --bg-section: #1e1e1e;
            --border-card: #2c3e50;
            --shadow: rgba(0,0,0,0.3);
        }

        /* إضافة تنعيم وتأثير انتقال شامل للعناصر الأساسية */
        * { 
            box-sizing: border-box;
            margin: 0; 
            padding: 0; 
            font-family: 'Cairo', sans-serif; 
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        body { 
            background-color: var(--bg-body);
            color: var(--text-main); 
        }

        /* شريط التنقل العلوي */
        .nav-bar { 
            background-color: var(--bg-nav);
            padding: 15px 20px; 
        }
        .nav-container { 
            max-width: 800px; 
            margin: 0 auto; 
            display: flex;
            justify-content: space-between; 
            align-items: center; 
        }
        .nav-controls { 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }

        .back-btn { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; 
            text-decoration: none;
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 600;
            transition: background 0.3s ease, transform 0.2s ease; 
        }
        .back-btn:hover { 
            background: #1abc9c;
            transform: translateX(-3px); 
        }
        html[dir="ltr"] .back-btn:hover { 
            transform: translateX(3px);
        }

        /* أزرار التحكم العلوي */
        .lang-btn, .theme-btn { 
            background: #1abc9c;
            color: #fff; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center;
            gap: 5px; 
            transition: background 0.3s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            height: 35px;
        }
        .lang-btn:hover, .theme-btn:hover { 
            background: #16a085; 
            transform: scale(1.05);
        }
        .theme-btn:active, .lang-btn:active { 
            transform: scale(0.95);
        }

        /* قسم الهيدر المخصص للشعار الهوية المحدث */
        .header-logo-section {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .logo-wrapper {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: #ffffff;
            padding: 5px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #1abc9c;
            overflow: hidden;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .main-container { 
            max-width: 800px;
            margin: 10px auto 40px auto; 
            padding: 0 20px; 
        }

        /* الصناديق المتجاوبة */
        .section-box { 
            background: var(--bg-section);
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 20px var(--shadow); 
            margin-bottom: 25px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .section-box:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 30px var(--shadow);
        }
        
        .section-title { 
            font-size: 1.2rem;
            color: var(--text-title); 
            margin-bottom: 15px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        .section-title i { 
            color: #1abc9c;
        }

        /* مشغل الفيديو */
        .video-box { 
            width: 100%;
            border-radius: 8px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .video-box video { 
            width: 100%; 
            height: auto; 
            display: block; 
            max-height: 450px;
        }

        /* معرض الصور */
        .gallery-main { 
            width: 100%;
            height: 400px; 
            border-radius: 8px; 
            overflow: hidden; 
            margin-bottom: 12px; 
            background: #eee; 
            position: relative;
        }
        .gallery-main img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 1;
            transition: opacity 0.2s ease-in-out, transform 0.5s ease; 
        }
        .gallery-main:hover img { 
            transform: scale(1.02);
        }
        
        .gallery-main img.fade-out { 
            opacity: 0;
        }

        /* شبكة الصور المصغرة */
        .thumbnails-grid { 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
        }
        .thumb { 
            width: 100%; 
            height: 80px;
            border-radius: 6px; 
            object-fit: cover; 
            cursor: pointer; 
            opacity: 0.5; 
            border: 2px solid transparent;
            transition: opacity 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
        }
        .thumb:hover { 
            opacity: 0.8; 
            transform: translateY(-2px);
        }
        .thumb.active { 
            opacity: 1; 
            border-color: #1abc9c; 
            transform: scale(1.03) translateY(-2px);
        }

        .map-box { 
            width: 100%; 
            height: 350px; 
            border-radius: 8px; 
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }

        footer { 
            background-color: var(--bg-nav); 
            color: white;
            text-align: center; 
            padding: 25px 10px; 
            margin-top: 40px; 
        }
        footer p { 
            font-size: 0.9rem;
        }

        html[dir="ltr"] #backIcon { 
            transform: rotate(180deg);
        }

        @media (max-width: 576px) {
            .gallery-main { height: 250px; }
            .thumb { height: 60px; }
            .map-box { height: 280px; }
            .logo-wrapper { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-container">
        <a href="index.html" class="back-btn" id="backBtn">
            <i class="fa-solid fa-arrow-right" id="backIcon"></i> 
            <span class="data-text">العودة للرئيسية</span>
        </a>
        <div class="nav-controls">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="lang-btn" onclick="toggleLanguage()">
                <i class="fa-solid fa-globe"></i> 
                <span id="langText">EN</span>
            </button>
        </div>
    </div>
</div>

<div class="header-logo-section">
    <div class="logo-wrapper">
        <img src="jpg.jpeg" alt="شركة ود العقارية" onerror="this.src='https://via.placeholder.com/150'">
    </div>
</div>

<div class="main-container">
    
    <div style="margin-bottom: 30px; text-align: center;">
        <h1 style="color: var(--text-title); font-size: 1.8rem; font-weight: 700; margin-bottom: 5px;" id="mainTitle">تفاصيل ومعاينة الشقة</h1>
        <p style="color: var(--text-muted); font-size: 0.95rem;" id="companyName">شركة ود العقارية</p>
    </div>

    <div class="section-box">
        <div class="section-title" id="videoTitle"><i class="fa-solid fa-circle-play"></i> <span class="data-text">فيديو المعاينة الحية</span></div>
        <div class="video-box">
            <video controls poster="img1.jpg">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="section-box">
         <div class="section-title" id="galleryTitle"><i class="fa-solid fa-images"></i> <span class="data-text">معرض الصور الفوتوغرافية</span></div>
        <div class="gallery-main">
            <img id="mainImage" src="img1.jpg" alt="المعروض الرئيسي" onerror="this.src='https://via.placeholder.com/800x400/eee/999?text=Image+Not+Found'">
        </div>
        <div class="thumbnails-grid">
            <img class="thumb active" src="img1.jpg" onclick="changeImage(this)" loading="lazy" onerror="this.src='https://via.placeholder.com/150'">
            <img class="thumb" src="img2.jpg" onclick="changeImage(this)" loading="lazy" onerror="this.src='https://via.placeholder.com/150'">
            <img class="thumb" src="img3.jpg" onclick="changeImage(this)" loading="lazy" onerror="this.src='https://via.placeholder.com/150'">
            <img class="thumb" src="img4.jpg" onclick="changeImage(this)" loading="lazy" onerror="this.src='https://via.placeholder.com/150'">
        </div>
    </div>

    <div class="section-box">
        <div class="section-title" id="mapTitle"><i class="fa-solid fa-map-location-dot"></i> <span class="data-text">الموقع على خرائط جوجل</span></div>
        <div class="map-box">
            <iframe src="https://maps.google.com/maps?q=Saudi+Arabia&t=&z=13&ie=UTF-8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>
</div>

<footer>
    <p id="footerText">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
</footer>

<script>
// ==========================================
// ميزة الحماية: منع الزر الأيمن والاختصارات
// ==========================================
document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'F12') {
        e.preventDefault();
        return false;
    }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
        e.preventDefault();
        return false;
    }
    if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
        e.preventDefault();
        return false;
    }
});

// تغيير الصور المصغرة مع تأثير التلاشي السلس الـ (Fade Effect)
function changeImage(element) {
    const mainImg = document.getElementById('mainImage');
    if (mainImg.src !== element.src) {
        mainImg.classList.add('fade-out');
        setTimeout(() => {
            mainImg.src = element.src;
            mainImg.classList.remove('fade-out');
        }, 200);
    }

    let thumbs = document.getElementsByClassName('thumb');
    for(let i=0; i<thumbs.length; i++) {
        thumbs[i].classList.remove('active');
    }
    element.classList.add('active');
}

// قاموس النصوص الكامل للغتين
const translations = {
    ar: {
        pageTitle: "تفاصيل العقار - شركة ود العقارية",
        backBtn: "العودة للرئيسية",
        mainTitle: "تفاصيل ومعاينة الشقة",
        companyName: "شركة ود العقارية",
        videoTitle: "فيديو المعاينة الحية",
        galleryTitle: "معرض الصور الفوتوغرافية",
        mapTitle: "الموقع على خرائط جوجل",
        footerText: "جميع الحقوق محفوظة © شركة ود العقارية 2026",
        langBtn: "EN"
    },
    en: {
        pageTitle: "Property Details - Wed Real Estate",
        backBtn: "Back to Home",
        mainTitle: "Apartment Details & Preview",
        companyName: "Wed Real Estate",
        videoTitle: "Live Preview Video",
        galleryTitle: "Photo Gallery",
        mapTitle: "Google Maps Location",
        footerText: "All Rights Reserved © Wed Real Estate 2026",
        langBtn: "AR"
    }
};

// إعدادات المظهر والوضع الليلي/النهاري الذكي
const htmlElement = document.documentElement;
const savedTheme = localStorage.getItem('theme');
const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

if (savedTheme) {
    setTheme(savedTheme);
} else {
    setTheme(systemPrefersDark ? 'dark' : 'light');
}

function setTheme(theme) {
    htmlElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
}

function toggleTheme() {
    const currentTheme = htmlElement.getAttribute('data-theme');
    setTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('theme')) {
        setTheme(e.matches ? 'dark' : 'light');
    }
});

// إعدادات الترجمة واللغة
let currentLang = localStorage.getItem('selectedLang') || 'ar';

document.addEventListener("DOMContentLoaded", () => {
    setLanguage(currentLang); 
});

function toggleLanguage() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('selectedLang', currentLang);
    setLanguage(currentLang);
}

function setLanguage(lang) {
    const html = document.getElementById('htmlPage');
    html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    html.setAttribute('lang', lang);
    document.title = translations[lang].pageTitle;
    document.querySelector('#backBtn .data-text').textContent = translations[lang].backBtn;
    document.getElementById('mainTitle').textContent = translations[lang].mainTitle;
    document.getElementById('companyName').textContent = translations[lang].companyName;
    document.querySelector('#videoTitle .data-text').textContent = translations[lang].videoTitle;
    document.querySelector('#galleryTitle .data-text').textContent = translations[lang].galleryTitle;
    document.querySelector('#mapTitle .data-text').textContent = translations[lang].mapTitle;
    document.getElementById('footerText').textContent = translations[lang].footerText;
    document.getElementById('langText').textContent = translations[lang].langBtn;
}
</script>
</body>
</html>
