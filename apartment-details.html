<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">تفاصيل العقار - شركة ود العقارية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. متغيرات الألوان وأنظمة العرض (CSS Variables & Themes)
           ========================================================================== */
        :root {
            --bg-body: #f4f7f6;
            --text-main: #333333;
            --text-title: #2c3e50;
            --text-muted: #7f8c8d;
            --bg-nav: #1a252f;
            --bg-section: #ffffff;
            --border-card: #e2f0ea;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --text-main: #e0e0e0;
            --text-title: #ffffff;
            --text-muted: #b0bec5;
            --bg-nav: #0a0f14;
            --bg-section: #1e1e1e;
            --border-card: #2c3e50;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        /* ==========================================================================
           2. تأثيرات التمرير والظهور (Scroll Animations)
           ========================================================================== */
        .section-box, .property-main-header, .contact-section-buttons {
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                        transform 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                        background-color 0.3s ease, 
                        color 0.3s ease;
        }

        .section-box:nth-child(odd) {
            transform: translateX(50px);
        }

        .section-box:nth-child(even), .property-main-header, .contact-section-buttons {
            transform: translateX(-50px);
        }

        .reveal-in {
            opacity: 1;
            transform: translateX(0) !important;
        }

        /* ==========================================================================
           3. التنسيقات العامة (Global Styles)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 40px;
        }

        .nav-bar {
            background-color: var(--bg-nav);
            padding: 15px 20px;
        }

        .nav-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .back-btn:hover {
            background: #1abc9c;
        }

        .lang-btn, .theme-btn {
            background: #1abc9c;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 35px;
        }

        .lang-btn:hover, .theme-btn:hover {
            background: #16a085;
        }

        .main-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .property-main-header {
            text-align: center;
            margin-bottom: 35px;
            padding: 20px;
            background: var(--bg-section);
            border-radius: 12px;
            border: 3px solid var(--border-card);
            box-shadow: 0 10px 20px var(--shadow);
        }

        .property-main-header h1 {
            color: var(--text-title);
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .section-box {
            background: var(--bg-section);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px var(--shadow);
            margin-bottom: 25px;
            border: 1px solid var(--border-card);
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--text-title);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: #1abc9c;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .video-container iframe, .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .gallery-main {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            background: #eeeeee;
            position: relative;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }

        .gallery-main img.fade-out {
            opacity: 0;
        }

        .thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .thumb {
            width: 100%;
            height: 80px;
            border-radius: 6px;
            object-fit: cover;
            cursor: pointer;
            opacity: 0.5;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .thumb:hover {
            opacity: 0.8;
        }

        .thumb.active {
            opacity: 1;
            border-color: #1abc9c;
            transform: scale(1.03);
        }

        .contact-section-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 25px;
        }

        .btn-action {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, background-color 0.3s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .btn-whatsapp { background-color: #25D366; }
        .btn-phone    { background-color: #3498db; }
        .btn-facebook { background-color: #1877F2; }

        .status-msg {
            text-align: center;
            padding: 50px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-title);
        }

        footer {
            background-color: var(--bg-nav);
            color: white;
            text-align: center;
            padding: 25px 10px;
            margin-top: 40px;
        }

        @media (max-width: 576px) {
            .gallery-main { height: 250px; }
            .thumb { height: 60px; }
            .contact-section-buttons { grid-template-columns: 1fr; }
            .property-main-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <div class="nav-bar">
        <div class="nav-container">
            <a href="index.html" class="back-btn" id="backBtn">
                <i class="fa-solid fa-arrow-right" id="backIcon"></i>
                <span class="data-text">العودة للرئيسية</span>
            </a>
            
            <div class="nav-controls">
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="lang-btn" onclick="toggleLanguage()">
                    <i class="fa-solid fa-globe"></i>
                    <span id="langText">EN</span>
                </button>
            </div>
        </div>
    </div>

    <main class="main-container" id="mainContainer">
        <div class="status-msg" id="statusMessage">
            <i class="fa-solid fa-circle-notch fa-spin"></i> جاري جلب تفاصيل المعاينة...
        </div>
    </main>

    <footer>
        <p id="footerText">جميع الحقوق محفوظة © شركة ود العقارية 2018</p>
    </footer>

    <script>
        function initializeDetailsAnimation() {
            const elementsToAnimate = document.querySelectorAll('.property-main-header, .section-box, .contact-section-buttons');
            const observerOptions = { root: null, rootMargin: '0px', threshold: 0.1 };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('reveal-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            elementsToAnimate.forEach(el => observer.observe(el));
        }

        /* ==========================================================================
           الجافاسكريبت والمنطق البرمجي (JavaScript Logic)
           ========================================================================== */
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        let currentLang = localStorage.getItem('selectedLang') || 'ar';
        let currentPropertyData = null;

        const translations = {
            ar: {
                pageTitle: "تفاصيل العقار - شركة ود العقارية",
                backBtn: "العودة للرئيسية",
                videoTitle: "فيديو المعاينة الحية",
                galleryTitle: "معرض الصور الفوتوغرافية",
                mapTitle: "موقع العقار على الخريطة",
                footerText: "جميع الحقوق محفوظة © شركة ود العقارية 2018",
                langBtn: "EN",
                loading: "جاري جلب تفاصيل المعاينة...",
                error: "عذراً، لم يتم العثور على العقار المطلوب أو هناك خلل في الاتصال."
            },
            en: {
                pageTitle: "Property Details - Wed Real Estate",
                backBtn: "Back to Home",
                videoTitle: "Live Preview Video",
                galleryTitle: "Photo Gallery",
                mapTitle: "Property Location on Map",
                footerText: "All Rights Reserved © Wed Real Estate 2018",
                langBtn: "AR",
                loading: "Loading preview details...",
                error: "Sorry, the requested property was not found or connection failed."
            }
        };

        const fallbackVideos = ["https://youtu.be/J3Bo7HVZ1xA?si=m1WdnvRHHI9QhIoz"];
        const fallbackMaps = ["https://maps.google.com/?q=Cairo"];
        const fallbackImages = ["https://via.placeholder.com/800x400?text=No+Image"];

        function escapeHTML(str) {
            if (!str) return "";
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // حماية فحص العناصر
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'i' || e.key === 'j')) || (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault();
                return false;
            }
        });

        function changeImage(element) {
            const mainImg = document.getElementById('mainImage');
            if (!mainImg || mainImg.src === element.src) return;

            mainImg.classList.add('fade-out');
            setTimeout(() => {
                mainImg.src = element.src;
                mainImg.classList.remove('fade-out');
            }, 200); 

            let thumbs = document.getElementsByClassName('thumb');
            for (let i = 0; i < thumbs.length; i++) {
                thumbs[i].classList.remove('active');
            }
            element.classList.add('active');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('selectedLang', currentLang);
            setLanguage(currentLang);
        }

        function setLanguage(lang) {
            const html = document.getElementById('htmlPage');
            html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            html.setAttribute('lang', lang);

            document.title = translations[lang].pageTitle;
            document.getElementById('footerText').textContent = translations[lang].footerText;
            document.getElementById('langText').textContent = translations[lang].langBtn;
            
            const backBtnText = document.querySelector('#backBtn .data-text');
            if (backBtnText) backBtnText.textContent = translations[lang].backBtn;

            const backIcon = document.getElementById('backIcon');
            if (backIcon) backIcon.className = lang === 'ar' ? 'fa-solid fa-arrow-right' : 'fa-solid fa-arrow-left';

            if (currentPropertyData) {
                renderDetails(currentPropertyData);
            } else {
                const statusMsg = document.getElementById('statusMessage');
                if (statusMsg) statusMsg.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${translations[lang].loading}`;
            }
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) themeBtn.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        }

        function toggleTheme() {
            setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function getGalleryImages(item) {
            const galleryImages = [];
            Object.keys(item).forEach(key => {
                const normalizedKey = key.toLowerCase().trim();
                if (normalizedKey.startsWith("gallery ") || normalizedKey.startsWith("gallery_") || /^gallery\d+$/i.test(normalizedKey)) {
                    const value = item[key];
                    if (value && value.toString().trim() !== "") {
                        galleryImages.push(optimizeDriveImageUrl(value));
                    }
                }
            });
            return [...new Set(galleryImages)].filter(Boolean);
        }

        function extractGoogleDriveId(url) {
            if (!url) return "";
            const text = url.toString().trim();
            const patterns = [/\/file\/d\/([^/]+)/, /\/d\/([^/]+)/, /[?&]id=([^&]+)/, /open\?id=([^&]+)/, /uc\?[^#]*id=([^&]+)/];
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match && match[1]) return decodeURIComponent(match[1]);
            }
            return "";
        }

        function optimizeDriveImageUrl(url) {
            if (!url || !url.toString().trim()) return "";
            const driveId = extractGoogleDriveId(url.toString().trim());
            if (driveId) return `https://drive.google.com/thumbnail?id=${encodeURIComponent(driveId)}&sz=w1200`;
            return url;
        }

        function getField(item, names) {
            for (const name of names) {
                if (item[name] !== undefined && item[name] !== null && item[name].toString().trim() !== "") return item[name];
            }
            return "";
        }

        function optimizeVideoUrl(url) {
            if (!url || !url.toString().trim()) return "";
            const cleanedUrl = url.toString().trim();
            
            const driveId = extractGoogleDriveId(cleanedUrl);
            if (driveId) return `https://drive.google.com/file/d/${encodeURIComponent(driveId)}/preview`;

            if (cleanedUrl.includes('youtube.com/watch') || cleanedUrl.includes('youtube.com/embed/')) {
                const match = cleanedUrl.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                if (match && match[2].length === 11) return `https://www
