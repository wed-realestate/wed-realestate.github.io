<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlPage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        // 🛑 رابط الـ API الخاص بـ Google Sheets
        window.GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbwuLelt-EngMLn1P4FP6fdjbVR5RBSxoM30kiNxI0xshvWMsqEyUkNbnsH0YcwIjRgd/exec";
        
        // 🛑 إعدادات الشعار
        window.LOGO_URL = "logo.png";
        window.LOGO_FALLBACK_URL = "https://via.placeholder.com/150";
    </script>

    <title id="pageTitle">تفاصيل العقار - شركة ود العقارية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg-body: #f4f7f6; --text-main: #333; --text-title: #2c3e50; --text-muted: #7f8c8d; 
            --bg-nav: #1a252f; --bg-section: #fff; --border-card: #e2f0ea; --shadow: rgba(0,0,0,0.05); 
        }
        [data-theme="dark"] { 
            --bg-body: #121212; --text-main: #e0e0e0; --text-title: #ffffff; --text-muted: #b0bec5; 
            --bg-nav: #0a0f14; --bg-section: #1e1e1e; --border-card: #2c3e50; --shadow: rgba(0,0,0,0.3); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; }
        body { background-color: var(--bg-body); color: var(--text-main); }
        
        /* الشريط العلوي */
        .nav-bar { background-color: var(--bg-nav); padding: 15px 20px; }
        .nav-container { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-controls { display: flex; gap: 10px; align-items: center;}
        .back-btn { background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; }
        .back-btn:hover { background: #1abc9c; }
        .lang-btn, .theme-btn { background: #1abc9c; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; height: 35px; }
        
        /* قسم الشعار (في المنتصف مع إطار أبيض خفيف) */
        .header-logo-section { text-align: center; margin-top: 30px; margin-bottom: 20px; display: flex; justify-content: center; }
        .logo-wrapper { width: 130px; height: 130px; border-radius: 50%; background-color: #ffffff; padding: 5px; display: inline-flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 4px solid #f8f9fa; overflow: hidden; }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        /* الحاوية الرئيسية والمقاطع */
        .main-container { max-width: 800px; margin: 10px auto 40px auto; padding: 0 20px; }
        .section-box { background: var(--bg-section); padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px var(--shadow); margin-bottom: 25px; }
        .section-title { font-size: 1.2rem; color: var(--text-title); margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #1abc9c; }
        
        /* الفيديو ومعرض الصور والخريطة */
        .video-box { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
        .video-box video { width: 100%; height: auto; display: block; max-height: 450px; }
        .gallery-main { width: 100%; height: 400px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; background: #eee; }
        .gallery-main img { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.2s ease-in-out; }
        .gallery-main img.fade-out { opacity: 0; }
        .thumbnails-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .thumb { width: 100%; height: 80px; border-radius: 6px; object-fit: cover; cursor: pointer; opacity: 0.5; border: 2px solid transparent; }
        .thumb.active { opacity: 1; border-color: #1abc9c; }
        .map-box { width: 100%; height: 350px; border-radius: 8px; overflow: hidden; }
        
        footer { background-color: var(--bg-nav); color: white; text-align: center; padding: 25px 10px; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-container">
            <a href="اساسية.html" class="back-btn" id="backBtn">
                <i class="fa-solid fa-arrow-right" id="backIcon"></i> <span class="data-text">العودة للرئيسية</span>
            </a>
            <div class="nav-controls">
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
                <button class="lang-btn" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span id="langText">EN</span></button>
            </div>
        </div>
    </div>

    <div class="header-logo-section">
        <div class="logo-wrapper">
            <img id="mainLogo" alt="شركة ود العقارية">
        </div>
    </div>

    <div class="main-container">
        <div style="margin-bottom: 30px; text-align: center;">
            <h1 style="color: var(--text-title); font-size: 1.8rem; font-weight: 700; margin-bottom: 5px;" id="mainTitle">تفاصيل ومعاينة الشقة</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem;" id="companyName">شركة ود العقارية</p>
        </div>

        <div class="section-box" id="videoSection" style="display:none;">
            <div class="section-title" id="videoTitle"><i class="fa-solid fa-circle-play"></i> <span class="data-text">فيديو المعاينة الحية</span></div>
            <div class="video-box">
                <video id="propertyVideo" controls src=""></video>
            </div>
        </div>

        <div class="section-box">
             <div class="section-title" id="galleryTitle"><i class="fa-solid fa-images"></i> <span class="data-text">معرض الصور الفوتوغرافية</span></div>
            <div class="gallery-main">
                <img id="mainImage" src="" alt="المعروض الرئيسي" onerror="this.src='https://via.placeholder.com/800x400/eee/999?text=Image+Not+Found'">
            </div>
            <div class="thumbnails-grid" id="thumbnailsGrid"></div>
        </div>

        <div class="section-box" id="mapSection" style="display:none;">
            <div class="section-title" id="mapTitle"><i class="fa-solid fa-map-location-dot"></i> <span class="data-text">الموقع على خرائط جوجل</span></div>
            <div class="map-box">
                <iframe id="propertyMap" src="" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <p id="footerText">جميع الحقوق محفوظة © شركة ود العقارية 2026</p>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = parseInt(urlParams.get('id')) || 1;

        // --- جلب البيانات وبناء عناصر الصفحة ---
      async function loadProperties() {
    try {
        const response = await fetch(window.GOOGLE_SHEETS_API_URL);
        const data = await response.json();
        
        let properties = [];
        if (Array.isArray(data)) {
            properties = data;
        } else if (data && data.status === "success" && data.data) {
            properties = data.data;
        }

        if (properties.length > 0) {
            // 🔍 هذا السطر سيطبع لك أسماء الأعمدة كما يراها المتصفح تماماً
            console.log("👉 أسماء الأعمدة القادمة من قوقل شيت هي:", Object.keys(properties[0]));
            
            window.cachedProperties = properties;
            renderProperties(window.cachedProperties);
        } else {
            throw new Error("Data format error or empty rows");
        }
    } catch (error) {
        console.error("Error fetching sheets data:", error);
        document.getElementById('propertiesContainer').innerHTML = `
            <div class="error-message">
                فشل في جلب البيانات من Google Sheets.<br>
                تأكد من فتح منصة الفحص (F12) لرؤية الأسماء الصحيحة للأعمدة.
            </div>`;
    }
}
                    // معالجة الصور
                    const imgFields = ['الصورة', 'صورة2', 'صورة3', 'صورة4', 'image', 'image2', 'image3', 'image4'];
                    let validImages = [];
                    imgFields.forEach(field => { if (item[field]) validImages.push(optimizeDriveImageUrl(item[field])); });

                    if (validImages.length > 0) {
                        document.getElementById('mainImage').src = validImages[0];
                        const thumbGrid = document.getElementById('thumbnailsGrid'); thumbGrid.innerHTML = '';
                        validImages.forEach((imgSrc, idx) => {
                            let img = document.createElement('img'); img.className = `thumb ${idx === 0 ? 'active' : ''}`;
                            img.src = imgSrc; img.onclick = function() { changeImage(this); }; thumbGrid.appendChild(img);
                        });
                    }

                    // معالجة الفيديو
                    const videoUrl = item.الفيديو || item.video;
                    if (videoUrl) {
                        document.getElementById('propertyVideo').src = optimizeDriveImageUrl(videoUrl);
                        document.getElementById('videoSection').style.display = 'block';
                    }

                    // معالجة الخريطة وتضمينها بشكل صحيح
                    const mapUrl = item.الخريطة || item.map || item.الموقع;
                    if (mapUrl) {
                        let finalMapUrl = mapUrl.trim();
                        // تصحيح كود الـ Embed لضمان عرض الخريطة
                        if (finalMapUrl.includes('maps/place') || finalMapUrl.includes('goo.gl') || finalMapUrl.includes('google.com/maps')) {
                            finalMapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(finalMapUrl)}&t=&z=14&ie=UTF8&iwloc=&output=embed`;
                        }
                        
                        document.getElementById('propertyMap').src = finalMapUrl;
                        document.getElementById('mapSection').style.display = 'block';
                    }
                }
            } catch (error) {
                console.error("Error loading details:", error);
            }
        }

        // --- وظائف مساعدة لمعالجة الروابط وتغيير الصور ---
        function optimizeDriveImageUrl(url) {
            if (!url) return "";
            let cleanUrl = url.trim();
            if (cleanUrl.includes('drive.google.com')) {
                let id = '';
                if (cleanUrl.includes('id=')) { id = cleanUrl.split('id=')[1].split('&')[0]; } 
                else if (cleanUrl.includes('/d/')) { id = cleanUrl.split('/d/')[1].split('/')[0]; }
                if (id) return `https://docs.google.com/uc?export=view&id=${id}`;
            }
            return cleanUrl;
        }

        function changeImage(element) {
            const mainImg = document.getElementById('mainImage');
            if (mainImg.src !== element.src) {
                mainImg.classList.add('fade-out');
                setTimeout(() => { mainImg.src = element.src; mainImg.classList.remove('fade-out'); }, 200);
            }
            let thumbs = document.getElementsByClassName('thumb');
            for(let i=0; i<thumbs.length; i++) { thumbs[i].classList.remove('active'); }
            element.classList.add('active');
        }

        // --- نظام اللغات والمظهر ---
        const translations = {
            ar: { pageTitle: "تفاصيل العقار - شركة ود العقارية", backBtn: "العودة للرئيسية", mainTitle: "تفاصيل ومعاينة الشقة", companyName: "شركة ود العقارية", videoTitle: "فيديو المعاينة الحية", galleryTitle: "معرض الصور الفوتوغرافية", mapTitle: "الموقع على خرائط جوجل", footerText: "جميع الحقوق محفوظة © شركة ود العقارية 2026", langBtn: "EN" },
            en: { pageTitle: "Property Details - Wed Real Estate", backBtn: "Back to Home", mainTitle: "Apartment Details & Preview", companyName: "Wed Real Estate", videoTitle: "Live Preview Video", galleryTitle: "Photo Gallery", mapTitle: "Google Maps Location", footerText: "All Rights Reserved © Wed Real Estate 2026", langBtn: "AR" }
        };

        const htmlElement = document.documentElement;
        let currentLang = localStorage.getItem('selectedLang') || 'ar';

        function setLanguage(lang) {
            currentLang = lang; localStorage.setItem('selectedLang', lang);
            htmlElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr'); htmlElement.setAttribute('lang', lang);
            
            document.title = translations[lang].pageTitle; 
            document.querySelector('#backBtn .data-text').textContent = translations[lang].backBtn; 
            document.getElementById('companyName').textContent = translations[lang].companyName; 
            document.querySelector('#videoTitle .data-text').textContent = translations[lang].videoTitle; 
            document.querySelector('#galleryTitle .data-text').textContent = translations[lang].galleryTitle; 
            document.querySelector('#mapTitle .data-text').textContent = translations[lang].mapTitle; 
            document.getElementById('footerText').textContent = translations[lang].footerText; 
            document.getElementById('langText').textContent = translations[lang].langBtn;
            
            const backIcon = document.getElementById('backIcon');
            if (backIcon) { backIcon.className = lang === 'ar' ? 'fa-solid fa-arrow-right' : 'fa-solid fa-arrow-left'; }
        }

        window.toggleLanguage = function() { setLanguage(currentLang === 'ar' ? 'en' : 'ar'); }

        function setTheme(theme) {
            htmlElement.setAttribute('data-theme', theme); localStorage.setItem('theme', theme);
            const themeBtn = document.getElementById('themeBtn'); 
            if(themeBtn) themeBtn.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        }

        window.toggleTheme = function() { setTheme(htmlElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

        // --- نقطة انطلاق الصفحة عند التحميل ---
        document.addEventListener("DOMContentLoaded", () => { 
            // ضبط الشعار
            const logoImg = document.getElementById('mainLogo');
            logoImg.src = window.LOGO_URL;
            logoImg.onerror = function() { this.src = window.LOGO_FALLBACK_URL; };

            setLanguage(currentLang); 
            setTheme(localStorage.getItem('theme') || 'light'); 
            loadPropertyDetails();
        });
    </script>
</body>
</html>
